<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMCee - Control Center</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #3b82f6;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar { width: 280px; background: #020617; border-right: 1px solid #334155; padding: 30px; display: flex; flex-direction: column; }
        .logo-area { font-size: 20px; font-weight: 800; letter-spacing: -1px; margin-bottom: 40px; color: var(--accent); }
        .nav-link { text-decoration: none; color: var(--text-dim); padding: 12px; border-radius: 10px; display: flex; align-items: center; gap: 12px; transition: 0.3s; margin-bottom: 10px; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-box { background: var(--card-dark); padding: 25px; border-radius: 20px; border: 1px solid #334155; position: relative; overflow: hidden; }
        .stat-box i { position: absolute; right: -10px; bottom: -10px; font-size: 80px; opacity: 0.05; color: white; }
        .stat-val { font-size: 32px; font-weight: 700; display: block; }
        .stat-label { color: var(--text-dim); font-size: 13px; text-transform: uppercase; }

        .work-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        @media (max-width: 1100px) { .work-grid { grid-template-columns: 1fr; } }

        .glass-card { background: var(--card-dark); border-radius: 24px; border: 1px solid #334155; padding: 30px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card-title { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }

        /* Estilos de Estado */
        .status-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dot-online { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-offline { background: #64748b; }

        .table-wrap { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .table-wrap th { text-align: left; padding: 15px; color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        .table-wrap tr td { background: #1a2233; padding: 15px; border-top: 1px solid #334155; border-bottom: 1px solid #334155; }
        .table-wrap tr td:first-child { border-left: 1px solid #334155; border-radius: 15px 0 0 15px; }
        .table-wrap tr td:last-child { border-right: 1px solid #334155; border-radius: 0 15px 15px 0; }

        .form-dark input, .form-dark select { 
            background: #0f172a; border: 1px solid #334155; color: white; padding: 14px; 
            border-radius: 12px; width: 100%; margin-bottom: 15px; box-sizing: border-box; 
        }
        .btn-primary { 
            background: var(--accent); color: white; border: none; padding: 15px; 
            border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.3s;
        }
        .btn-primary:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .log-v-item { border-left: 2px solid var(--accent); padding: 0 0 20px 20px; position: relative; }
        .log-v-item::before { content: ''; position: absolute; left: -6px; top: 0; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
        .log-v-user { font-weight: 700; font-size: 13px; color: var(--text-main); }
        .log-v-action { color: var(--accent); font-size: 11px; font-weight: 800; margin-left: 8px; }
        .log-v-time { font-size: 10px; color: var(--text-dim); display: block; margin-top: 4px; }

        .badge-admin { background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; }
        .badge-user { background: rgba(59, 130, 246, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area"><i class="fa-solid fa-shield-halved"></i> SMCee ADMIN</div>
        <nav>
            <a href="index.html" class="nav-link"><i class="fa-solid fa-map-location-dot"></i> Mapa General</a>
            <a href="#" class="nav-link active"><i class="fa-solid fa-users-gear"></i> Gestión Usuarios</a>
            <a href="javascript:location.reload()" class="nav-link"><i class="fa-solid fa-rotate"></i> Actualizar</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="card-header" style="margin-bottom:30px">
            <h1 style="margin:0">Dashboard de Control</h1>
            <div style="background: #1e293b; padding: 8px 15px; border-radius: 10px; font-size: 13px; border: 1px solid #334155;">
                <span style="color:var(--success)">●</span> Sistema de Vigilancia Activo
            </div>
        </header>

        <div class="stats-row">
            <div class="stat-box">
                <i class="fa-solid fa-video"></i>
                <span class="stat-label">Cámaras Instaladas</span>
                <span class="stat-val" id="stat-cameras">-</span>
            </div>
            <div class="stat-box">
                <i class="fa-solid fa-user-check"></i>
                <span class="stat-label">Usuarios Registrados</span>
                <span class="stat-val" id="stat-users">-</span>
            </div>
            <div class="stat-box">
                <i class="fa-solid fa-bolt"></i>
                <span class="stat-label">Acciones Hoy</span>
                <span class="stat-val" id="stat-logs">-</span>
            </div>
        </div>

        <div class="work-grid">
            <div class="glass-card">
                <div class="card-header">
                    <h3 class="card-title">Usuarios del Sistema</h3>
                </div>
                <table class="table-wrap">
                    <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>Estado / Último Acceso</th>
                            <th>Rango</th>
                            <th>Contraseña</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="lista-usuarios"></tbody>
                </table>
            </div>

            <div style="display: flex; flex-direction: column; gap: 30px;">
                <div class="glass-card">
                    <h3 class="card-title" style="margin-bottom:20px"><i class="fa-solid fa-plus-circle"></i> Nuevo Acceso</h3>
                    <div class="form-dark">
                        <input type="text" id="new-user" placeholder="Nombre de usuario">
                        <input type="text" id="new-pass" placeholder="Clave de acceso">
                        <select id="new-rol">
                            <option value="user">Operador Estándar</option>
                            <option value="admin">Administrador Pro</option>
                        </select>
                        <button class="btn-primary" onclick="crearUsuario()">VINCULAR USUARIO</button>
                    </div>
                </div>

                <div class="glass-card">
                    <h3 class="card-title" style="margin-bottom:20px"><i class="fa-solid fa-list-ul"></i> Auditoría</h3>
                    <div id="log-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');

        const session = JSON.parse(localStorage.getItem('user_session'));
        if (!session || session.rol !== 'admin') window.location.replace('index.html');

        async function cargarData() {
            // Stats
            const { count: cC } = await _client.from('cameras').select('*', { count: 'exact', head: true });
            const { count: uC } = await _client.from('usuarios').select('*', { count: 'exact', head: true });
            const { count: lC } = await _client.from('logs_actividad').select('*', { count: 'exact', head: true });
            
            document.getElementById('stat-cameras').innerText = cC || 0;
            document.getElementById('stat-users').innerText = uC || 0;
            document.getElementById('stat-logs').innerText = lC || 0;

            // Usuarios (Usando tus columnas: is_online y last_login)
            const { data: users } = await _client.from('usuarios').select('*').order('usuario');
            const tbody = document.getElementById('lista-usuarios');
            tbody.innerHTML = '';
            
            users?.forEach(u => {
                const bClass = u.rol === 'admin' ? 'badge-admin' : 'badge-user';
                const statusDot = u.is_online ? 'dot-online' : 'dot-offline';
                const statusText = u.is_online ? 'En línea' : 'Desconectado';
                const fechaLimpia = u.last_login ? new Date(u.last_login).toLocaleString() : 'Sin registros';

                tbody.innerHTML += `
                    <tr>
                        <td><b>${u.usuario}</b></td>
                        <td>
                            <div class="status-indicator">
                                <span class="dot ${statusDot}"></span>
                                <span style="color:${u.is_online ? 'var(--success)' : 'var(--text-dim)'}">${statusText}</span>
                            </div>
                            <div style="font-size:10px; color:var(--text-dim); margin-top:4px;">${fechaLimpia}</div>
                        </td>
                        <td><span class="${bClass}">${u.rol?.toUpperCase()}</span></td>
                        <td><code style="color:var(--text-dim)">${u.clave}</code></td>
                        <td><button style="background:none; border:none; color:var(--danger); cursor:pointer;" onclick="eliminarUsuario('${u.id}', '${u.usuario}')"><i class="fa-solid fa-trash"></i></button></td>
                    </tr>`;
            });

            // Logs
            const { data: logs } = await _client.from('logs_actividad').select('*').order('fecha', {ascending: false}).limit(6);
            const lContainer = document.getElementById('log-list');
            lContainer.innerHTML = '';
            logs?.forEach(l => {
                lContainer.innerHTML += `
                    <div class="log-v-item">
                        <div><span class="log-v-user">${l.usuario}</span> <span class="log-v-action">${l.accion}</span></div>
                        <div style="font-size:11px; color:var(--text-dim)">${l.detalle}</div>
                        <span class="log-v-time">${new Date(l.fecha).toLocaleString()}</span>
                    </div>`;
            });
        }

        async function crearUsuario() {
            const u = document.getElementById('new-user').value;
            const p = document.getElementById('new-pass').value;
            const r = document.getElementById('new-rol').value;
            if(!u || !p) return alert("Completa los datos");
            // Se inserta con is_online false por defecto
            const { error } = await _client.from('usuarios').insert([{ usuario: u, clave: p, rol: r, is_online: false }]);
            if(error) alert(error.message); else { 
                document.getElementById('new-user').value=''; 
                document.getElementById('new-pass').value=''; 
                cargarData(); 
            }
        }

        async function eliminarUsuario(id, nom) {
            if(nom === session.usuario) return alert("No puedes borrarte a ti mismo");
            if(confirm("¿Eliminar acceso?")) {
                await _client.from('usuarios').delete().eq('id', id);
                cargarData();
            }
        }

        // Carga inicial y auto-actualización cada 30 segundos
        cargarData();
        setInterval(cargarData, 30000);
    </script>
</body>
</html>
