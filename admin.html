
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#0f172a;
color:white;
}

.header{
padding:15px 25px;
background:#020617;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#2563eb;
border:none;
padding:8px 14px;
border-radius:6px;
color:white;
cursor:pointer;
}

.container{
padding:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

.stat{
font-size:26px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
font-size:13px;
}

th{
color:#94a3b8;
text-align:left;
}

.online{
color:#10b981;
font-weight:bold;
}

.offline{
color:#64748b;
}

#map{
height:400px;
margin-top:20px;
border-radius:12px;
overflow:hidden;
}

</style>
</head>

<body>

<div class="header">
<h2>Panel Admin</h2>
<button onclick="cargar()">Actualizar</button>
</div>

<div class="container">

<div class="stats">

<div class="card">
<div>Usuarios</div>
<div class="stat" id="stat_users">-</div>
</div>

<div class="card">
<div>Usuarios Online</div>
<div class="stat" id="stat_online">-</div>
</div>

<div class="card">
<div>Cámaras</div>
<div class="stat" id="stat_cams">-</div>
</div>

<div class="card">
<div>Logs</div>
<div class="stat" id="stat_logs">-</div>
</div>

</div>

<table>
<thead>
<tr>
<th>Usuario</th>
<th>Estado</th>
<th>Última actividad</th>
<th>Última conexión</th>
<th>Rol</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<div id="map"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
'https://ubdlfcjcgdnzqwjvwsmn.supabase.co',
'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu'
);

let map = L.map('map').setView([-42.9,-71.3],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let markers=[];

function limpiarMarkers(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

}

function tiempoRelativo(fecha){

if(!fecha) return "Sin datos";

let diff=(new Date()-new Date(fecha))/1000;

if(diff<60) return "Hace segundos";
if(diff<3600) return "Hace "+Math.floor(diff/60)+" min";
if(diff<86400) return "Hace "+Math.floor(diff/3600)+" h";

return Math.floor(diff/86400)+" días";

}

function horaExacta(fecha){

if(!fecha) return "-";

let f=new Date(fecha);

return f.toLocaleDateString()+" "+f.toLocaleTimeString();

}

async function cargar(){

limpiarMarkers();

const ahora=new Date();

const {data:users}=await supabaseClient
.from('usuarios')
.select('*')
.order('usuario');

const {count:cams}=await supabaseClient
.from('cameras')
.select('*',{count:'exact',head:true});

const {count:logs}=await supabaseClient
.from('logs_actividad')
.select('*',{count:'exact',head:true});

document.getElementById("stat_users").innerText=users.length;
document.getElementById("stat_cams").innerText=cams||0;
document.getElementById("stat_logs").innerText=logs||0;

let onlineCount=0;

const tabla=document.getElementById("tabla");
tabla.innerHTML="";

for(const u of users){

let ultima=u.last_login?new Date(u.last_login):null;
let online=ultima&&(ahora-ultima)<70000;

if(online) onlineCount++;

tabla.innerHTML+=`
<tr>
<td>${u.usuario}</td>
<td class="${online?'online':'offline'}">${online?'En línea':'Offline'}</td>
<td>${tiempoRelativo(u.last_login)}</td>
<td>${horaExacta(u.last_login)}</td>
<td>${u.rol||'-'}</td>
</tr>
`;

if(online && u.lat && u.lng){

let marker=L.marker([u.lat,u.lng])
.addTo(map)
.bindPopup("<b>"+u.usuario+"</b><br>Conectado");

markers.push(marker);

}

}

document.getElementById("stat_online").innerText=onlineCount;

}

cargar();

</script>

</body>
</html>
