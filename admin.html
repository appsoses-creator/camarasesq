
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel V4</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--accent:#3b82f6;
--bg:#0f172a;
--card:#1e293b;
--text:#f8fafc;
--dim:#94a3b8;
--success:#10b981;
--danger:#ef4444;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
color:var(--text);
margin:0;
display:flex;
height:100vh;
}

.sidebar{
width:230px;
background:#020617;
border-right:1px solid #334155;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-weight:800;
color:var(--accent);
margin-bottom:30px;
}

.nav a{
display:flex;
gap:10px;
padding:10px;
border-radius:8px;
text-decoration:none;
color:var(--dim);
margin-bottom:5px;
}

.nav a:hover{
background:rgba(255,255,255,0.05);
color:white;
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.stats{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:var(--card);
padding:18px;
border-radius:16px;
border:1px solid #334155;
}

.stat-val{
font-size:26px;
font-weight:700;
}

.stat-label{
font-size:11px;
color:var(--dim);
text-transform:uppercase;
}

.table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.table th{
text-align:left;
font-size:11px;
color:var(--dim);
border-bottom:1px solid #334155;
padding:10px;
}

.table td{
padding:12px 10px;
border-bottom:1px solid #334155;
font-size:13px;
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.online{
background:var(--success);
box-shadow:0 0 6px var(--success);
}

.offline{
background:var(--danger);
box-shadow:0 0 6px var(--danger);
}

.username{
cursor:pointer;
color:#60a5fa;
font-weight:600;
}

.username:hover{
text-decoration:underline;
}

select{
background:#0f172a;
border:1px solid #334155;
color:white;
border-radius:6px;
padding:4px;
}

.logbox{
max-height:350px;
overflow:auto;
margin-top:10px;
}

.log{
border-left:2px solid var(--accent);
padding-left:10px;
margin-bottom:10px;
font-size:12px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#020617;
padding:25px;
border-radius:14px;
width:500px;
max-height:70vh;
overflow:auto;
border:1px solid #334155;
}

.close{
float:right;
cursor:pointer;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo"><i class="fa-solid fa-shield-halved"></i> ADMIN</div>

<div class="nav">
<a href="index.html"><i class="fa-solid fa-map"></i> Volver al mapa</a>
<a href="javascript:cargar()"><i class="fa-solid fa-rotate"></i> Actualizar</a>
</div>
</div>

<div class="main">

<div class="stats">

<div class="card">
<div class="stat-label">Cámaras</div>
<div class="stat-val" id="stat-cams">-</div>
</div>

<div class="card">
<div class="stat-label">Usuarios</div>
<div class="stat-val" id="stat-users">-</div>
</div>

<div class="card">
<div class="stat-label">Online</div>
<div class="stat-val" id="stat-online">-</div>
</div>

<div class="card">
<div class="stat-label">Logs</div>
<div class="stat-val" id="stat-logs">-</div>
</div>

<div class="card">
<div class="stat-label">Cámaras creadas hoy</div>
<div class="stat-val" id="stat-creadas">-</div>
</div>

<div class="card">
<div class="stat-label">Ediciones hoy</div>
<div class="stat-val" id="stat-edits">-</div>
</div>

</div>

<div class="card">
<h3>Usuarios</h3>

<table class="table">
<thead>
<tr>
<th>Usuario</th>
<th>Estado</th>
<th>Última conexión</th>
<th>Cámaras creadas</th>
<th>Rol</th>
<th></th>
</tr>
</thead>
<tbody id="tabla-users"></tbody>
</table>
</div>

<div class="card" style="margin-top:20px;">
<h3>Actividad reciente</h3>
<div class="logbox" id="logs"></div>
</div>

</div>

<div class="modal" id="modalUser">
<div class="modal-content">
<span class="close" onclick="cerrarModal()"><i class="fa-solid fa-xmark"></i></span>
<h3 id="modalTitle">Actividad</h3>
<div id="modalBody"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
'https://ubdlfcjcgdnzqwjvwsmn.supabase.co',
'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu'
);

function formatoHora(fecha){
if(!fecha) return "Sin datos";
return new Date(fecha).toLocaleString();
}

async function cargar(){

const ahora = new Date();

const {data:users} = await supabaseClient.from('usuarios').select('*').order('usuario');

const {count:cams} = await supabaseClient.from('cameras').select('*',{count:'exact',head:true});
const {count:logs} = await supabaseClient.from('logs_actividad').select('*',{count:'exact',head:true});

document.getElementById("stat-cams").innerText=cams||0;
document.getElementById("stat-users").innerText=users.length;
document.getElementById("stat-logs").innerText=logs||0;

let onlineCount=0;

const tbody=document.getElementById("tabla-users");
tbody.innerHTML="";

for(const u of users){

let ultima = u.last_login ? new Date(u.last_login) : null;
let online = ultima && (ahora-ultima)<70000;

if(online) onlineCount++;

const {count:userCams} = await supabaseClient
.from('cameras')
.select('*',{count:'exact',head:true})
.eq('usuario',u.usuario);

tbody.innerHTML+=`
<tr>

<td class="username" onclick="verUsuario('${u.usuario}')">${u.usuario}</td>

<td>
<span class="status-dot ${online?'online':'offline'}"></span>
${online?'En línea':'Fuera de línea'}
</td>

<td>${formatoHora(u.last_login)}</td>

<td>${userCams||0}</td>

<td>
<select onchange="cambiarRol('${u.id}',this.value)">
<option value="user" ${u.rol==='user'?'selected':''}>OPERADOR</option>
<option value="admin" ${u.rol==='admin'?'selected':''}>ADMIN</option>
</select>
</td>

<td>
<i class="fa-solid fa-trash" style="color:#f43f5e;cursor:pointer"
onclick="eliminar('${u.id}','${u.usuario}')"></i>
</td>

</tr>
`;

}

document.getElementById("stat-online").innerText=onlineCount;

cargarEstadisticas();
cargarLogs();

}

async function cargarLogs(){

const {data} = await supabaseClient
.from('logs_actividad')
.select('*')
.order('fecha',{ascending:false})
.limit(20);

const logbox=document.getElementById("logs");
logbox.innerHTML="";

data.forEach(l=>{

logbox.innerHTML+=`
<div class="log">
<b>${l.usuario}</b> ${l.accion}<br>
<span style="color:#94a3b8">${l.detalle}</span>
</div>
`;

});

}

async function cargarEstadisticas(){

let hoy = new Date().toISOString().split('T')[0];

const {count:creadas} = await supabaseClient
.from('logs_actividad')
.select('*',{count:'exact',head:true})
.ilike('accion','%crear%')
.gte('fecha',hoy);

const {count:edits} = await supabaseClient
.from('logs_actividad')
.select('*',{count:'exact',head:true})
.ilike('accion','%editar%')
.gte('fecha',hoy);

document.getElementById("stat-creadas").innerText=creadas||0;
document.getElementById("stat-edits").innerText=edits||0;

}

async function cambiarRol(id,rol){

if(!confirm("¿Seguro que querés cambiar el rol del usuario?")) return;

await supabaseClient
.from('usuarios')
.update({rol:rol})
.eq('id',id);

}

async function verUsuario(usuario){

document.getElementById("modalTitle").innerText="Actividad de "+usuario;

const {data} = await supabaseClient
.from('logs_actividad')
.select('*')
.eq('usuario',usuario)
.order('fecha',{ascending:false})
.limit(50);

let html="";

if(!data || data.length===0){
html="No hay registros.";
}else{

data.forEach(l=>{

html+=`
<div class="log">
<b>${l.accion}</b><br>
${l.detalle}<br>
<span style="color:#94a3b8">${new Date(l.fecha).toLocaleString()}</span>
</div>
`;

});

}

document.getElementById("modalBody").innerHTML=html;
document.getElementById("modalUser").style.display="flex";

}

function cerrarModal(){
document.getElementById("modalUser").style.display="none";
}

async function eliminar(id,nom){

if(confirm("Eliminar usuario "+nom+" ?")){

await supabaseClient
.from('usuarios')
.delete()
.eq('id',id);

cargar();

}

}

cargar();

</script>

</body>
</html>
