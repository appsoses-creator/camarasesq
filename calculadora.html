<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Desfasaje - CÁMARAS 10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --bg: #f1f5f9;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calc-card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            margin: 0;
            color: var(--dark);
            font-size: 20px;
        }

        .header p {
            color: #64748b;
            font-size: 13px;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        input[type="time"], input[type="datetime-local"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            color: var(--dark);
            box-sizing: border-box;
            background: #f8fafc;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 16px;
            background: #eff6ff;
            border: 1px solid #dbeafe;
            text-align: center;
            display: none;
        }

        .result-title {
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--dark);
        }

        .btn-back {
            display: block;
            width: 100%;
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-calc {
            width: 100%;
            background: var(--dark);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-calc:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="calc-card">
        <div class="header">
            <i class="fa-solid fa-clock-rotate-left" style="font-size: 30px; color: var(--primary); margin-bottom: 10px;"></i>
            <h2>Calculadora de Tiempo</h2>
            <p>Calcula el desfasaje de los equipos DVR</p>
        </div>

        <div class="input-group">
            <label>Hora que muestra el DVR</label>
            <input type="time" id="horaDVR" step="1">
        </div>

        <div class="input-group">
            <label>Hora Real (Tu celular)</label>
            <input type="time" id="horaReal" step="1">
        </div>

        <button class="btn-calc" onclick="calcular()">Calcular Desfasaje</button>

        <div class="result-box" id="resultado">
            <div class="result-title" id="tipoDesfasaje">Diferencia Detectada</div>
            <div class="result-value" id="valorDesfasaje">00:00:00</div>
            <p id="instruccionBusqueda" style="font-size: 11px; color: #64748b; margin-top: 10px;"></p>
        </div>

        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Volver al Mapa</a>
    </div>

    <script>
        function calcular() {
            const dvr = document.getElementById('horaDVR').value;
            const real = document.getElementById('horaReal').value;

            if (!dvr || !real) {
                alert("Por favor, completa ambas horas.");
                return;
            }

            const [h1, m1, s1] = dvr.split(':').map(Number);
            const [h2, m2, s2] = real.split(':').map(Number);

            const segDVR = h1 * 3600 + m1 * 60 + (s1 || 0);
            const segReal = h2 * 3600 + m2 * 60 + (s2 || 0);

            let diferencia = segReal - segDVR;
            let esAdelanto = diferencia < 0; // Si el DVR marca más que el real
            
            diferencia = Math.abs(diferencia);

            const h = Math.floor(diferencia / 3600);
            const m = Math.floor((diferencia % 3600) / 60);
            const s = diferencia % 60;

            const format = (n) => String(n).padStart(2, '0');
            const resultadoTxt = `${format(h)}:${format(m)}:${format(s)}`;

            document.getElementById('valorDesfasaje').innerText = resultadoTxt;
            document.getElementById('resultado').style.display = 'block';

            const tipoMsg = esAdelanto ? "El DVR está adelantado" : "El DVR está atrasado";
            document.getElementById('tipoDesfasaje').innerText = tipoMsg;
            
            document.getElementById('instruccionBusqueda').innerText = 
                esAdelanto 
                ? `Para buscar las ${real}, busca en el DVR las ${dvr}.`
                : `Para buscar las ${real}, busca en el DVR las ${dvr}.`;
        }
    </script>
</body>
</html>
