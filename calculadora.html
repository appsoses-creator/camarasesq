<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora DPIE - CÁMARAS 10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --card-gray: #1e1e1e;
            --input-gray: #2d2d2d;
            --border-soft: #333333;
            --btn-grad: linear-gradient(90deg, #4f46e5, #7c3aed);
            --text-neon: #4ade80;
            --danger: #e11d48;
            --success: #22c55e;
            --btn-mapa: #262626; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        h1 { 
            font-size: 22px; 
            margin: 10px 0 20px; 
            text-align: center; 
            letter-spacing: 0.5px;
            color: white;
        }

        .card {
            background: var(--card-gray);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid var(--border-soft);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card-title {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #reloj-actual {
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-neon);
            text-align: center;
        }

        .input-wrapper {
            background: var(--input-gray);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border-soft);
        }

        input[type="datetime-local"] {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-size: 16px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        input::-webkit-calendar-picker-indicator { filter: invert(0.8); }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.1s;
        }

        .btn-main:active { transform: scale(0.96); }
        .btn-calc { background: var(--btn-grad); margin-bottom: 5px; }
        .btn-download { background: #374151; margin-top: 10px; border: 1px solid #4b5563; }
        
        .btn-mapa-container { margin-top: 10px; padding-bottom: 30px; }
        .btn-volver-mapa { background: var(--btn-mapa); border: 1px solid #404040; text-decoration: none; }

        .result-card {
            display: none;
            border-radius: 20px;
            padding: 18px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .time-box {
            background: rgba(0, 0, 0, 0.25);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .time-value { font-size: 22px; font-weight: 800; }
        .time-label { font-size: 10px; font-weight: 700; opacity: 0.6; }

        .download-result {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            border-left: 5px solid var(--text-neon);
            display: none;
        }

        .dvr-time-output {
            color: var(--text-neon);
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 700;
            display: block;
            margin-top: 5px;
        }

        /* ESTILO DE LA LEYENDA SOLICITADA */
        .leyenda-rango {
            margin-top: 15px;
            font-size: 13px;
            font-style: italic;
            line-height: 1.4;
            color: #d1d5db;
            text-align: center;
        }

        @media (min-width: 400px) {
            .result-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calculadora DPIE</h1>

        <div class="card">
            <div class="card-title"><i class="fa-solid fa-satellite-dish"></i> HORA ACTUAL REAL</div>
            <div id="reloj-actual">--/--/----, --:--:--</div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fa-solid fa-1"></i> SINCRONIZAR CON DVR</div>
            <div class="input-wrapper">
                <i class="fa-regular fa-clock" style="color:#6366f1"></i>
                <input type="datetime-local" id="hora-dvr" step="1">
            </div>
            <button class="btn-main btn-calc" onclick="calcularDesfase()">
                <i class="fa-solid fa-sync"></i> CALCULAR DESFASAJE
            </button>
        </div>

        <div id="resultado" class="result-card">
            <div id="res-header" style="display: flex; align-items: center; gap: 10px; font-weight: 800; color: white;">
                <i id="res-icon" class="fa-solid"></i>
                <span id="res-title"></span>
            </div>
            <div class="result-grid">
                <div class="time-box"><div id="v-dias" class="time-value">0</div><div class="time-label">DÍAS</div></div>
                <div class="time-box"><div id="v-horas" class="time-value">0</div><div class="time-label">HORAS</div></div>
                <div class="time-box"><div id="v-minutos" class="time-value">0</div><div class="time-label">MINS</div></div>
                <div class="time-box"><div id="v-segundos" class="time-value">0</div><div class="time-label">SEGS</div></div>
            </div>
        </div>

        <div id="seccion-descarga" class="card" style="display:none;">
            <div class="card-title"><i class="fa-solid fa-2"></i> RANGO REAL A BUSCAR</div>
            
            <div class="input-wrapper"><input type="datetime-local" id="real-start" step="1"></div>
            <div class="input-wrapper"><input type="datetime-local" id="real-end" step="1"></div>
            
            <button class="btn-main btn-download" onclick="obtenerHorasDVR()">
                <i class="fa-solid fa-magnifying-glass"></i> OBTENER HORAS DVR
            </button>

            <div id="res-descarga" class="download-result">
                <div>
                    <div style="margin-bottom: 10px;">
                        <span style="font-size: 10px; opacity: 0.7;">INICIO DVR:</span>
                        <span id="out-start" class="dvr-time-output"></span>
                    </div>
                    <div>
                        <span style="font-size: 10px; opacity: 0.7;">FIN DVR:</span>
                        <span id="out-end" class="dvr-time-output"></span>
                    </div>
                </div>
                <div id="leyenda-texto" class="leyenda-rango"></div>
            </div>
        </div>

        <div class="btn-mapa-container">
            <a href="index.html" class="btn-main btn-volver-mapa">
                <i class="fa-solid fa-map-location-dot fa-lg"></i> VOLVER AL MAPA
            </a>
        </div>

        <p style="font-size: 10px; opacity: 0.4; text-align: center;">Desarrollado por Oses Lisandro</p>
    </div>

    <script>
        let offsetMs = 0;

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj-actual').innerText = ahora.toLocaleString('es-AR', { hour12: false }).replace(',', '');
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        function calcularDesfase() {
            const valDVR = document.getElementById('hora-dvr').value;
            if(!valDVR) return alert("Ingresa la hora del DVR");

            const ahora = new Date();
            const dvr = new Date(valDVR);
            offsetMs = dvr.getTime() - ahora.getTime();

            const absDiff = Math.abs(offsetMs);
            document.getElementById('v-dias').innerText = Math.floor(absDiff / 86400000);
            document.getElementById('v-horas').innerText = Math.floor((absDiff % 86400000) / 3600000);
            document.getElementById('v-minutos').innerText = Math.floor((absDiff % 3600000) / 60000);
            document.getElementById('v-segundos').innerText = Math.floor((absDiff % 60000) / 1000);

            const res = document.getElementById('resultado');
            res.style.display = 'block';
            document.getElementById('seccion-descarga').style.display = 'block';

            if(offsetMs < 0) {
                res.style.background = 'linear-gradient(135deg, #e11d48, #9f1239)';
                document.getElementById('res-title').innerText = "DVR ATRASADO";
                document.getElementById('res-icon').className = "fa-solid fa-circle-exclamation";
            } else {
                res.style.background = 'linear-gradient(135deg, #22c55e, #15803d)';
                document.getElementById('res-title').innerText = "DVR ADELANTADO";
                document.getElementById('res-icon').className = "fa-solid fa-circle-check";
            }
            
            setTimeout(() => { document.getElementById('seccion-descarga').scrollIntoView({ behavior: 'smooth' }); }, 300);
        }

        function obtenerHorasDVR() {
            const s = document.getElementById('real-start').value;
            const e = document.getElementById('real-end').value;
            if(!s || !e) return alert("Completa el rango real");

            const dvrStart = new Date(new Date(s).getTime() + offsetMs);
            const dvrEnd = new Date(new Date(e).getTime() + offsetMs);
            const fmt = (d) => d.toLocaleString('es-AR', { hour12: false }).replace(',', '');
            
            document.getElementById('out-start').innerText = fmt(dvrStart);
            document.getElementById('out-end').innerText = fmt(dvrEnd);

            // CÁLCULO DE LA LEYENDA DINÁMICA
            const absDiff = Math.abs(offsetMs);
            const d = Math.floor(absDiff / 86400000);
            const h = Math.floor((absDiff % 86400000) / 3600000);
            const m = Math.floor((absDiff % 3600000) / 60000);
            const seg = Math.floor((absDiff % 60000) / 1000);
            const tipo = offsetMs < 0 ? "(atrasado)" : "(adelantado)";

            const leyenda = `Cubre perfectamente tu rango real de ${fmt(new Date(s))} a ${fmt(new Date(e))} + ${d}d ${h}h ${m}m ${seg}s ${tipo}.`;
            
            document.getElementById('leyenda-texto').innerText = leyenda;
            document.getElementById('res-descarga').style.display = 'block';
        }
    </script>
</body>
</html>
