<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora DPIE </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1138;
            --card-blue: #1e40af;
            --btn-start: #7e22ce;
            --btn-end: #db2777;
            --text-green: #4ade80;
            --glass: rgba(255, 255, 255, 0.1);
            --pill-gray: #161b3d;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Contenedores Principales */
        .card {
            background: #1d4ed8;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        #reloj-actual {
            font-family: 'Courier New', monospace;
            font-size: 26px;
            font-weight: 700;
            color: var(--text-green);
            margin: 10px 0;
        }

        /* Inputs y Campos de Selección */
        .input-wrapper {
            background: #3b82f6;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #60a5fa;
            color: #cbd5e1;
        }

        input[type="datetime-local"] {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        input::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        /* Botones Principales */
        .action-button {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, background 0.3s;
            box-sizing: border-box;
        }

        .action-button:active {
            transform: scale(0.98);
        }

        /* Estilo para el botón de calcular (gradiente) */
        .btn-calcular {
            background: linear-gradient(90deg, var(--btn-start), var(--btn-end));
            margin-bottom: 15px; /* Espacio con el botón de volver */
        }

        .btn-calcular:hover {
            opacity: 0.9;
        }

        /* Estilo para el botón de volver (color sólido de la interfaz) */
        .btn-volver {
            background: #161b3d; /* Color gris oscuro pill para contrastar */
            border: 1px solid rgba(255,255,255,0.1);
            color: #e2e8f0;
            text-decoration: none; /* Eliminar subrayado de enlace */
        }

        .btn-volver:hover {
            background: #1e293b;
        }

        /* Área de Resultado */
        .result-display {
            margin-top: 20px;
            padding: 18px;
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calculadora DPIE</h1>

        <div class="card">
            <div class="card-title">
                <i class="fa-regular fa-clock"></i> Hora Actual
            </div>
            <div id="reloj-actual">--/--/----, --:--:--</div>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fa-solid fa-rocket"></i> Hora del DVR
            </div>
            
            <div class="input-wrapper">
                <i class="fa-regular fa-calendar"></i>
                <input type="datetime-local" id="hora-dvr">
            </div>

            <button class="action-button btn-calcular" onclick="calcularDesfase()">
                <i class="fa-solid fa-rocket"></i> Calcular Desfasaje
            </button>

            <a href="index.html" class="action-button btn-volver">
                <i class="fa-solid fa-arrow-left"></i> Volver al Mapa
            </a>

            <div class="result-display" id="area-resultado">
                <div id="texto-resultado" style="font-weight: 700; font-size: 18px; margin-bottom: 5px;"></div>
                <div id="detalle-resultado" style="font-size: 13px; color: #cbd5e1; line-height: 1.4;"></div>
            </div>
        </div>
    </div>

    <script>
        // --- RELOJ AUTOMÁTICO EN TIEMPO REAL ---
        function actualizarReloj() {
            const ahora = new Date();
            const opciones = { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: false 
            };
            // Formatear la fecha y hora para que coincida con la imagen (dd/mm/aaaa, hh:mm:ss)
            const stringFecha = ahora.toLocaleString('es-AR', opciones).replace(',', '');
            document.getElementById('reloj-actual').innerText = stringFecha;
        }

        // Actualizar cada segundo y al cargar
        setInterval(actualizarReloj, 1000);
        actualizarReloj();


        // --- LÓGICA DE CÁLCULO DE DESFASE ---
        function calcularDesfase() {
            const inputDVR = document.getElementById('hora-dvr').value;
            if (!inputDVR) return alert("Por favor, selecciona la fecha y hora que muestra el DVR.");

            const fechaActual = new Date();
            const fechaDVR = new Date(inputDVR);

            // Calcular diferencia en milisegundos
            const diffMs = fechaActual - fechaDVR;
            // Convertir a segundos absolutos para el desglose
            const diffSegundosTotal = Math.floor(Math.abs(diffMs) / 1000);

            // Desglosar en horas, minutos y segundos
            const horas = Math.floor(diffSegundosTotal / 3600);
            const minutos = Math.floor((diffSegundosTotal % 3600) / 60);
            const segundos = diffSegundosTotal % 60;

            const resDiv = document.getElementById('area-resultado');
            const resTexto = document.getElementById('texto-resultado');
            const resDetalle = document.getElementById('detalle-resultado');

            // Mostrar el panel de resultados
            resDiv.style.display = 'block';
            
            // Formatear el tiempo
            const tiempoFormateado = `${horas}h ${minutos}m ${segundos}s`;
            
            if (diffMs > 0) {
                // Hora Actual > Hora DVR -> El DVR va retrasado
                resTexto.innerHTML = `<i class="fa-solid fa-warning" style="color: #fbbf24;"></i> <span style="color: #fbbf24;">Retraso: ${tiempoFormateado}</span>`;
                resDetalle.innerText = "El reloj del grabador está por detrás de la hora real. Para buscar un evento, debes restar este tiempo a la hora real.";
            } else {
                // Hora Actual < Hora DVR -> El DVR va adelantado
                resTexto.innerHTML = `<i class="fa-solid fa-circle-check" style="color: #60a5fa;"></i> <span style="color: #60a5fa;">Adelanto: ${tiempoFormateado}</span>`;
                resDetalle.innerText = "El reloj del grabador está por delante de la hora real. Para buscar un evento, debes sumar este tiempo a la hora real.";
            }
        }
    </script>
</body>
</html>
