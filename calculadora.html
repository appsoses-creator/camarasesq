<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora DPIE - CÁMARAS 10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1138;
            --card-blue: #1e40af;
            --accent-purple: #9333ea;
            --accent-pink: #db2777;
            --text-green: #22c55e;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Tabs Superiores */
        .tabs {
            display: flex;
            background: #161b3d;
            padding: 5px;
            border-radius: 15px;
            margin-bottom: 20px;
            justify-content: space-between;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #94a3b8;
            transition: 0.3s;
        }

        .tab.active {
            background: linear-gradient(90deg, #9333ea, #db2777);
            color: white;
        }

        /* Tarjetas Estilo Imagen */
        .card {
            background: #1d4ed8;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        #reloj-actual {
            font-family: 'Courier New', monospace;
            font-size: 26px;
            font-weight: 700;
            color: #4ade80; /* Verde neón de la imagen */
            margin: 10px 0;
        }

        /* Input y Botón */
        .input-wrapper {
            background: #3b82f6;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #60a5fa;
        }

        input[type="datetime-local"] {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-size: 16px;
            outline: none;
        }

        /* Eliminar icono default de calendario en algunos navegadores para que luzca como la imagen */
        input::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .btn-calcular {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(90deg, #7e22ce, #db2777);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .btn-calcular:active {
            transform: scale(0.98);
        }

        /* Resultado */
        .result-display {
            margin-top: 15px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(0,0,0,0.2);
            display: none;
        }

        .btn-volver {
            margin-top: 20px;
            display: inline-block;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calculadora DPIE</h1>

        <div class="tabs">
            <div class="tab active"><i class="fa-regular fa-clock"></i> Desfase</div>
            <div class="tab"><i class="fa-solid fa-download"></i> Descargas</div>
            <div class="tab"><i class="fa-solid fa-history"></i> Historial</div>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fa-regular fa-clock"></i> Hora Actual
            </div>
            <div id="reloj-actual">--/--/----, --:--:--</div>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fa-solid fa-rocket"></i> Hora del DVR
            </div>
            
            <div class="input-wrapper">
                <i class="fa-regular fa-calendar"></i>
                <input type="datetime-local" id="hora-dvr">
            </div>

            <button class="btn-calcular" onclick="calcularDesfase()">
                <i class="fa-solid fa-rocket"></i> Calcular Desfasaje
            </button>

            <div class="result-display" id="area-resultado">
                <div id="texto-resultado" style="font-weight: 700; font-size: 18px;"></div>
                <div id="detalle-resultado" style="font-size: 13px; margin-top: 5px; color: #cbd5e1;"></div>
            </div>
        </div>

        <a href="index.html" class="btn-volver"><i class="fa-solid fa-arrow-left"></i> Volver al Mapa</a>
    </div>

    <script>
        // Reloj Automático
        function actualizarReloj() {
            const ahora = new Date();
            const opciones = { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: false 
            };
            const stringFecha = ahora.toLocaleString('es-AR', opciones).replace(',', '');
            document.getElementById('reloj-actual').innerText = stringFecha;
        }

        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // Lógica de Cálculo
        function calcularDesfase() {
            const inputDVR = document.getElementById('hora-dvr').value;
            if (!inputDVR) return alert("Por favor, selecciona la fecha y hora del DVR");

            const fechaActual = new Date();
            const fechaDVR = new Date(inputDVR);

            const diffMs = fechaActual - fechaDVR;
            const diffSegundosTotal = Math.floor(Math.abs(diffMs) / 1000);

            const horas = Math.floor(diffSegundosTotal / 3600);
            const minutos = Math.floor((diffSegundosTotal % 3600) / 60);
            const segundos = diffSegundosTotal % 60;

            const resDiv = document.getElementById('area-resultado');
            const resTexto = document.getElementById('texto-resultado');
            const resDetalle = document.getElementById('detalle-resultado');

            resDiv.style.display = 'block';
            
            const tiempoFormateado = `${horas}h ${minutos}m ${segundos}s`;
            
            if (diffMs > 0) {
                resTexto.innerHTML = `<span style="color: #fbbf24;">Atrasado: ${tiempoFormateado}</span>`;
                resDetalle.innerText = "El DVR está por detrás de la hora real.";
            } else {
                resTexto.innerHTML = `<span style="color: #60a5fa;">Adelantado: ${tiempoFormateado}</span>`;
                resDetalle.innerText = "El DVR está por delante de la hora real.";
            }
        }
    </script>
</body>
</html>
