<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora DPIE - CÁMARAS 10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1138;
            --card-blue: #1d4ed8;
            --input-blue: #3b82f6;
            --btn-grad: linear-gradient(90deg, #7e22ce, #db2777);
            --text-neon: #4ade80;
            --danger: #e11d48; /* Rojo para atraso */
            --success: #22c55e; /* Verde para adelanto */
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 480px;
            text-align: center;
        }

        h1 { font-size: 24px; margin-bottom: 30px; }

        .card {
            background: var(--card-blue);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e2e8f0;
        }

        #reloj-actual {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-neon);
        }

        .input-wrapper {
            background: var(--input-blue);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #60a5fa;
        }

        input[type="datetime-local"] {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-size: 16px;
            outline: none;
        }

        input::-webkit-calendar-picker-indicator { filter: invert(1); }

        .btn-main {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-calc { background: var(--btn-grad); }
        .btn-back { background: #161b3d; text-decoration: none; font-size: 14px; }

        /* ESTILO RESULTADO (COMO EN LA IMAGEN) */
        .result-card {
            display: none;
            border-radius: 25px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
            position: relative;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 5px;
            border-radius: 12px;
            text-align: center;
        }

        .time-label { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.9; }
        .time-value { font-size: 20px; font-weight: 800; }

        .footer-times {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-family: monospace;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calculadora DPIE</h1>

        <div class="card">
            <div class="card-title"><i class="fa-regular fa-clock"></i> Hora Actual</div>
            <div id="reloj-actual">--/--/----, --:--:--</div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fa-solid fa-rocket"></i> Hora del DVR</div>
            <div class="input-wrapper">
                <i class="fa-regular fa-calendar"></i>
                <input type="datetime-local" id="hora-dvr" step="1">
            </div>

            <button class="btn-main btn-calc" onclick="calcular()">
                <i class="fa-solid fa-rocket"></i> Calcular Desfasaje
            </button>
            <a href="index.html" class="btn-main btn-back">Volver al Mapa</a>
        </div>

        <div id="resultado" class="result-card">
            <div class="result-header">
                <i id="res-icon" class="fa-solid"></i>
                <span id="res-title">¡Desfase Detectado!</span>
            </div>
            
            <p id="res-desc" style="font-size: 13px; margin-bottom: 15px;"></p>

            <div class="result-grid">
                <div class="time-box"><div class="time-label">Días</div><div id="v-dias" class="time-value">0</div></div>
                <div class="time-box"><div class="time-label">Horas</div><div id="v-horas" class="time-value">0</div></div>
                <div class="time-box"><div class="time-label">Minutos</div><div id="v-minutos" class="time-value">0</div></div>
                <div class="time-box"><div class="time-label">Segundos</div><div id="v-segundos" class="time-value">0</div></div>
            </div>

            <div class="footer-times">
                <div>HORA ACTUAL<br><span id="foot-actual"></span></div>
                <div style="text-align: right;">HORA DVR<br><span id="foot-dvr"></span></div>
            </div>
            <div style="font-size: 10px; text-align: center; margin-top: 10px; opacity: 0.5;">Desarrollado por Oses Lisandro</div>
        </div>
    </div>

    <script>
        function actualizarReloj() {
            const ahora = new Date();
            const fmt = ahora.toLocaleString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).replace(',', '');
            document.getElementById('reloj-actual').innerText = fmt;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        function calcular() {
            const input = document.getElementById('hora-dvr').value;
            if(!input) return alert("Selecciona la hora del DVR");

            const ahora = new Date();
            const dvr = new Date(input);
            const diffMs = ahora - dvr;
            const absDiff = Math.abs(diffMs);

            // Cálculos
            const dias = Math.floor(absDiff / (1000 * 60 * 60 * 24));
            const horas = Math.floor((absDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((absDiff % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((absDiff % (1000 * 60)) / 1000);

            // UI
            const resCard = document.getElementById('resultado');
            const resIcon = document.getElementById('res-icon');
            
            resCard.style.display = 'block';
            
            if(diffMs > 0) { // Atrasado
                resCard.style.background = 'linear-gradient(135deg, #e11d48, #9f1239)';
                resIcon.className = "fa-solid fa-circle-exclamation";
                document.getElementById('res-desc').innerText = "La hora del DVR está Atrasada respecto a la actual.";
            } else { // Adelantado
                resCard.style.background = 'linear-gradient(135deg, #22c55e, #15803d)';
                resIcon.className = "fa-solid fa-circle-check";
                document.getElementById('res-desc').innerText = "La hora del DVR está Adelantada respecto a la actual.";
            }

            document.getElementById('v-dias').innerText = dias;
            document.getElementById('v-horas').innerText = horas;
            document.getElementById('v-minutos').innerText = minutos;
            document.getElementById('v-segundos').innerText = segundos;

            document.getElementById('foot-actual').innerText = ahora.toLocaleString('es-AR').replace(',', '');
            document.getElementById('foot-dvr').innerText = dvr.toLocaleString('es-AR').replace(',', '');
        }
    </script>
</body>
</html>
