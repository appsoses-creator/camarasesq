<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora DPIE - Profesional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -1px;
            margin: 10px 0;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Estilo de Tarjetas Glass */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #reloj-actual {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* Inputs Modernos */
        .input-group { margin-bottom: 15px; }
        
        .input-field {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px;
            width: 100%;
            color: white;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }

        /* Botones */
        .btn-action {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }

        .btn-action:active { transform: scale(0.97); opacity: 0.9; }

        .btn-outline {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            margin-top: 10px;
        }

        /* RESULTADO (EL COLOR QUE PEDISTE MANTENER) */
        .result-card {
            display: none;
            border-radius: 24px;
            padding: 20px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .time-item {
            background: rgba(0,0,0,0.2);
            padding: 10px 5px;
            border-radius: 12px;
            text-align: center;
        }

        .time-val { font-size: 20px; font-weight: 800; display: block; }
        .time-lab { font-size: 9px; font-weight: 600; opacity: 0.7; }

        /* Sección de Salida de Datos */
        #seccion-descarga { display: none; }

        .output-box {
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid var(--primary);
            display: none;
        }

        .output-label { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
        .output-time { color: var(--primary); font-weight: 700; font-family: monospace; font-size: 16px; }

        footer { text-align: center; font-size: 10px; opacity: 0.4; margin: 20px 0; }

    </style>
</head>
<body>

    <div class="container">
        <h1>Calculadora DPIE</h1>

        <div class="glass-card">
            <div class="card-label"><i class="fa-solid fa-clock"></i> Hora Local</div>
            <div id="reloj-actual">00:00:00</div>
        </div>

        <div class="glass-card">
            <div class="card-label"><i class="fa-solid fa-1"></i> Sincronización DVR</div>
            <div class="input-group">
                <input type="datetime-local" id="hora-dvr" class="input-field" step="1">
            </div>
            <button class="btn-action" onclick="calcularDesfase()">
                <i class="fa-solid fa-sync"></i> CALCULAR DESFASE
            </button>
        </div>

        <div id="resultado" class="result-card">
            <div class="result-title">
                <i id="res-icon" class="fa-solid"></i>
                <span id="res-title"></span>
            </div>
            <div class="result-grid">
                <div class="time-item"><span id="v-dias" class="time-val">0</span><span class="time-lab">DÍAS</span></div>
                <div class="time-item"><span id="v-horas" class="time-val">0</span><span class="time-lab">HRS</span></div>
                <div class="time-item"><span id="v-minutos" class="time-val">0</span><span class="time-lab">MIN</span></div>
                <div class="time-item"><span id="v-segundos" class="time-val">0</span><span class="time-lab">SEG</span></div>
            </div>
        </div>

        <div id="seccion-descarga" class="glass-card">
            <div class="card-label"><i class="fa-solid fa-2"></i> Convertir Hora Real a DVR</div>
            <div class="input-group">
                <div style="font-size: 10px; margin: 0 0 5px 5px; color: var(--text-dim);">DESDE:</div>
                <input type="datetime-local" id="real-start" class="input-field" step="1">
            </div>
            <div class="input-group">
                <div style="font-size: 10px; margin: 0 0 5px 5px; color: var(--text-dim);">HASTA:</div>
                <input type="datetime-local" id="real-end" class="input-field" step="1">
            </div>
            <button class="btn-action" onclick="obtenerHorasDVR()">
                <i class="fa-solid fa-search"></i> OBTENER TIEMPO DVR
            </button>

            <div id="res-descarga" class="output-box">
                <div style="margin-bottom: 12px;">
                    <div class="output-label">INICIO EN DVR:</div>
                    <div id="out-start" class="output-time"></div>
                </div>
                <div>
                    <div class="output-label">FIN EN DVR:</div>
                    <div id="out-end" class="output-time"></div>
                </div>
            </div>
        </div>

        <a href="index.html" class="btn-action btn-outline" style="text-decoration: none;">
            <i class="fa-solid fa-arrow-left"></i> VOLVER AL MAPA
        </a>

        <footer>Desarrollado por Oses Lisandro</footer>
    </div>

    <script>
        let offsetMs = 0;

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj-actual').innerText = ahora.toLocaleString('es-AR', { hour12: false }).replace(',', '');
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        function calcularDesfase() {
            const valDVR = document.getElementById('hora-dvr').value;
            if(!valDVR) return;

            const ahora = new Date();
            const dvr = new Date(valDVR);
            offsetMs = dvr.getTime() - ahora.getTime();

            const absDiff = Math.abs(offsetMs);
            document.getElementById('v-dias').innerText = Math.floor(absDiff / 86400000);
            document.getElementById('v-horas').innerText = Math.floor((absDiff % 86400000) / 3600000);
            document.getElementById('v-minutos').innerText = Math.floor((absDiff % 3600000) / 60000);
            document.getElementById('v-segundos').innerText = Math.floor((absDiff % 60000) / 1000);

            const res = document.getElementById('resultado');
            res.style.display = 'block';
            document.getElementById('seccion-descarga').style.display = 'block';

            if(offsetMs < 0) {
                res.style.background = 'linear-gradient(135deg, #ef4444, #991b1b)';
                document.getElementById('res-title').innerText = "DVR ATRASADO";
                document.getElementById('res-icon').className = "fa-solid fa-triangle-exclamation";
            } else {
                res.style.background = 'linear-gradient(135deg, #22c55e, #166534)';
                document.getElementById('res-title').innerText = "DVR ADELANTADO";
                document.getElementById('res-icon').className = "fa-solid fa-check-circle";
            }
            
            setTimeout(() => { res.scrollIntoView({ behavior: 'smooth' }); }, 300);
        }

        function obtenerHorasDVR() {
            const s = document.getElementById('real-start').value;
            const e = document.getElementById('real-end').value;
            if(!s || !e) return alert("Ingresa el rango real");

            const dvrStart = new Date(new Date(s).getTime() + offsetMs);
            const dvrEnd = new Date(new Date(e).getTime() + offsetMs);
            const fmt = (d) => d.toLocaleString('es-AR', { hour12: false }).replace(',', '');
            
            document.getElementById('out-start').innerText = fmt(dvrStart);
            document.getElementById('out-end').innerText = fmt(dvrEnd);
            document.getElementById('res-descarga').style.display = 'block';
        }
    </script>
</body>
</html>
