<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámaras Regionales</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Barra Superior Profesional */
        .nav-container {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
            display: flex; align-items: center; background: white; 
            padding: 5px; border-radius: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            width: 90%; max-width: 580px;
        }

        .city-selector {
            display: flex; gap: 5px; padding: 0 10px; border-right: 1px solid #e2e8f0; margin-right: 5px;
        }

        .btn-nav {
            border: none; padding: 8px 14px; border-radius: 50px;
            font-size: 11px; font-weight: bold; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; gap: 6px;
            background: #f8fafc; color: #64748b; text-transform: uppercase;
        }

        .btn-esquel:hover { background: #dbeafe; color: #2563eb; }
        .btn-trevelin:hover { background: #fee2e2; color: #dc2626; }

        .search-area { flex: 1; display: flex; align-items: center; }
        .search-area input { width: 100%; border: none; padding: 10px; outline: none; font-size: 14px; }
        
        .search-btn {
            background: #2563eb; color: white; border: none; width: 35px; height: 35px;
            border-radius: 50%; cursor: pointer; transition: 0.3s;
        }
        .search-btn:hover { background: #1e40af; transform: scale(1.05); }

        /* Otros Estilos */
        #instruccion {
            display: none; position: fixed; top: 85px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: #1e293b; color: white; padding: 12px 25px;
            border-radius: 30px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-add {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000;
            background: #2563eb; color: white; border: none; padding: 15px 25px;
            border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .div-icon {
            display: flex; align-items: center; justify-content: center;
            background: white; border-radius: 50%; border: 2px solid;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .popup-actions { display: flex; gap: 5px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; }
        .btn-pop { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; color: white; }
        .btn-edit { background: #f59e0b; }
        .btn-delete { background: #ef4444; }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; background: white; padding: 20px; border-radius: 15px;
            width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .modal h3 { margin: 0 0 15px 0; color: #1e40af; }
        .modal label { font-size: 11px; color: #666; font-weight: bold; display: block; margin-top: 10px; }
        .modal input, .modal select, .modal textarea { 
            width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; 
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-save { width: 100%; padding: 15px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 16px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1500; }
        .crosshair { cursor: crosshair !important; }
    </style>
</head>
<body>

    <div id="instruccion">📍 Tocá el mapa en la ubicación de la cámara</div>

    <div class="nav-container">
        <div class="city-selector">
            <button class="btn-nav btn-esquel" onclick="irA([-42.912, -71.316])">
                <i class="fa-solid fa-mountain-city"></i> Esquel
            </button>
            <button class="btn-nav btn-trevelin" onclick="irA([-43.085, -71.463])">
                <i class="fa-solid fa-tree"></i> Trevelin
            </button>
        </div>
        <div class="search-area">
            <input type="text" id="q" placeholder="Buscar dirección o nombre..." onkeypress="if(event.key==='Enter') buscarLugar()">
            <button class="search-btn" onclick="buscarLugar()">🔍</button>
        </div>
    </div>

    <button class="btn-add" id="main-btn" onclick="activarModoSeleccion()">+ Añadir Cámara</button>

    <div class="overlay" id="blur" onclick="cerrarTodo()"></div>
    
    <div class="modal" id="form">
        <h3 id="form-title">Detalles de la Cámara</h3>
        <input type="hidden" id="edit-id">
        
        <label>Ciudad</label>
        <select id="ciudad_select">
            <option value="Esquel">Esquel</option>
            <option value="Trevelin">Trevelin</option>
        </select>

        <label>Ubicación Seleccionada</label>
        <input type="text" id="u" readonly style="background: #f8fafc; color: #64748b; font-family: monospace;">
        
        <label>Dirección (Calle y N°)</label>
        <input type="text" id="d" placeholder="Ej: Rivadavia 123">
        
        <label>Lugar / Titular</label>
        <input type="text" id="n" placeholder="Ej: Kiosco El Centro">
        
        <div class="grid-2">
            <div>
                <label>Tipo</label>
                <select id="t">
                    <option value="CENTRO DE MONITOREO">Monitoreo</option>
                    <option value="PRIVADAS">Privada</option>
                    <option value="PARTICULARES">Particular</option>
                </select>
            </div>
            <div>
                <label>Teléfono</label>
                <input type="text" id="tel" placeholder="2945...">
            </div>
        </div>
        
        <label>Sistema (Marca DVR/NVR)</label>
        <input type="text" id="sis" placeholder="Hikvision, Dahua, etc.">
        <div class="grid-2">
            <div>
                <label>Usuario</label>
                <input type="text" id="usu" placeholder="admin">
            </div>
            <div>
                <label>Contraseña / Patrón</label>
                <input type="text" id="pas" placeholder="Clave123">
            </div>
        </div>
        <label>Días de Almacenamiento</label>
        <input type="number" id="alm" placeholder="Cantidad de días">
        <label>Otros Datos</label>
        <textarea id="ot" rows="3" placeholder="Notas adicionales..."></textarea>
        <button class="btn-save" onclick="enviar()">Guardar Cambios</button>
        <button onclick="cerrarTodo()" style="width:100%; background:none; border:none; color:red; margin-top:10px; cursor:pointer; font-weight:bold;">Cancelar</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const supabaseUrl = 'https://ubdlfcjcgdnzqwjvwsmn.supabase.co';
        const supabaseKey = 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu';
        const _client = supabase.createClient(supabaseUrl, supabaseKey);

        // --- CONFIGURACIÓN DE CAPAS RECUPERADA ---
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' });
        const muted = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' });
        const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' });
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri' });

        const map = L.map('map', {
            center: [-42.912, -71.316],
            zoom: 14,
            layers: [osm]
        });

        const baseMaps = {
            "Calles (Color)": osm,
            "Gris Suave": muted,
            "Modo Oscuro": dark,
            "Satélite": satellite
        };

        L.control.layers(baseMaps).addTo(map);

        let items = [];
        let seleccionando = false;
        let tempMarker = null;
        let searchMarker = null;

        function irA(coords) {
            map.flyTo(coords, 14, { duration: 1.5 });
        }

        async function load() {
            items.forEach(i => map.removeLayer(i.m));
            items = [];
            const { data } = await _client.from('cameras').select('*');
            if(!data) return;

            data.forEach(c => {
                const lat = parseFloat(c.UBICACION?.split(',')[0]);
                const lng = parseFloat(c.UBICACION?.split(',')[1]);

                if (lat && lng) {
                    let color = 'green';
                    if (c.TIPO === 'CENTRO DE MONITOREO') color = 'blue';
                    if (c.TIPO === 'PRIVADAS') color = 'black';

                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="div-icon" style="border-color: ${color}; color: ${color}; width: 22px; height: 22px; font-size: 12px;">
                                <i class="fa-solid fa-video"></i>
                               </div>`,
                        iconSize: [22, 22],
                        iconAnchor: [11, 11]
                    });

                    const marker = L.marker([lat, lng], { icon }).addTo(map);
                    const popupDiv = document.createElement('div');
                    popupDiv.innerHTML = `
                        <b>📍 ${c.DIRECCION || 'Sin dirección'}</b><br>
                        <small>${c['LUGAR / TITULAR'] || ''}</small>
                        <div class="popup-actions">
                            <button class="btn-pop btn-edit" onclick="abrirEditar('${c.id}')">Editar</button>
                            <button class="btn-pop btn-delete" onclick="eliminar('${c.id}')">Borrar</button>
                        </div>
                    `;
                    marker.bindPopup(popupDiv);
                    items.push({ id: c.id, m: marker, data: c, info: (c.DIRECCION + " " + (c['LUGAR / TITULAR'] || '')).toLowerCase() });
                }
            });
        }

        async function buscarLugar() {
            const query = document.getElementById('q').value.trim();
            if (!query) return;
            if (searchMarker) map.removeLayer(searchMarker);
            const local = items.find(i => i.info.includes(query.toLowerCase()));
            if (local) {
                map.setView(local.m.getLatLng(), 18);
                local.m.openPopup();
            } else {
                const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}, Chubut, Argentina`);
                const results = await resp.json();
                if (results.length > 0) {
                    const lat = results[0].lat; const lon = results[0].lon;
                    map.setView([lat, lon], 17);
                    searchMarker = L.marker([lat, lon]).addTo(map)
                        .bindPopup(`<b>Encontrado:</b><br>${query}`)
                        .openPopup();
                }
            }
        }

        function abrirEditar(id) {
            const cam = items.find(i => i.id == id).data;
            document.getElementById('edit-id').value = cam.id;
            document.getElementById('u').value = cam.UBICACION;
            document.getElementById('d').value = cam.DIRECCION || '';
            document.getElementById('n').value = cam['LUGAR / TITULAR'] || '';
            document.getElementById('t').value = cam.TIPO;
            document.getElementById('tel').value = cam['TELÉFONO'] || '';
            document.getElementById('sis').value = cam['SISTEMA CÁMARAS'] || '';
            document.getElementById('usu').value = cam.USUARIO || '';
            document.getElementById('pas').value = cam.CONTRASEÑA || '';
            document.getElementById('alm').value = cam['ALMACENAMIENTO (DIAS)'] || '';
            document.getElementById('ot').value = cam['OTROS DATOS'] || '';
            document.getElementById('ciudad_select').value = cam.ciudad || 'Esquel';
            document.getElementById('form-title').innerText = "Editar Cámara";
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        }

        async function eliminar(id) {
            if (confirm("¿Eliminar definitivamente?")) {
                await _client.from('cameras').delete().eq('id', id);
                load();
            }
        }

        function activarModoSeleccion() {
            seleccionando = true;
            document.getElementById('map').classList.add('crosshair');
            document.getElementById('instruccion').style.display = 'block';
            document.getElementById('main-btn').style.display = 'none';
        }

        map.on('click', function(e) {
            if (!seleccionando) return;
            const { lat, lng } = e.latlng;
            document.getElementById('edit-id').value = "";
            document.getElementById('form-title').innerText = "Nueva Cámara";
            document.getElementById('u').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker([lat, lng]).addTo(map);
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
            document.getElementById('instruccion').style.display = 'none';
        });

        function cerrarTodo() {
            document.getElementById('form').style.display = 'none';
            document.getElementById('blur').style.display = 'none';
            document.getElementById('map').classList.remove('crosshair');
            document.getElementById('main-btn').style.display = 'block';
            if (tempMarker) map.removeLayer(tempMarker);
            if (searchMarker) map.removeLayer(searchMarker);
            seleccionando = false;
        }

        async function enviar() {
            const id = document.getElementById('edit-id').value;
            const cam = {
                "LUGAR / TITULAR": document.getElementById('n').value,
                "DIRECCION": document.getElementById('d').value,
                "TIPO": document.getElementById('t').value,
                "UBICACION": document.getElementById('u').value,
                "TELÉFONO": document.getElementById('tel').value,
                "SISTEMA CÁMARAS": document.getElementById('sis').value,
                "USUARIO": document.getElementById('usu').value,
                "CONTRASEÑA": document.getElementById('pas').value,
                "ALMACENAMIENTO (DIAS)": document.getElementById('alm').value,
                "OTROS DATOS": document.getElementById('ot').value,
                "ciudad": document.getElementById('ciudad_select').value
            };
            if (id) await _client.from('cameras').update(cam).eq('id', id);
            else await _client.from('cameras').insert([cam]);
            cerrarTodo(); load();
        }

        load();
    </script>
</body>
</html>
