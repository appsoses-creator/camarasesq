<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPIE</title>
    
    <script>
        (function() {
            const session = localStorage.getItem('user_session');
            let esValida = false;
            try {
                if (session) {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.usuario) esValida = true;
                }
            } catch (e) { esValida = false; }
            if (!esValida) {
                localStorage.removeItem('user_session');
                window.location.replace('login.html');
                document.documentElement.style.display = 'none';
            }
        })();
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --accent: #6366f1;
            --dark-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(255, 255, 255, 0.3);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--dark-bg); 
            overflow: hidden; 
            color: #1e293b;
        }

        #map { height: 100vh; width: 100%; z-index: 1; filter: grayscale(0.2) contrast(1.1); }

        /* NAVBAR */
        .top-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 92%; max-width: 1200px;
            display: flex; align-items: center; gap: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 20px; border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .search-group { 
            flex: 1; display: flex; align-items: center; 
            background: rgba(0,0,0,0.05); border-radius: 12px; 
            padding: 0 15px; border: 1px solid rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .search-group:focus-within { background: white; border-color: var(--primary); }
        .search-group input { 
            width: 100%; border: none; padding: 12px; outline: none; 
            background: transparent; font-size: 14px; font-weight: 500;
        }

        .actions-group { display: flex; align-items: center; gap: 8px; }

        .btn-nav {
            background: white; color: #475569; border: 1px solid #e2e8f0;
            padding: 10px 16px; border-radius: 10px; font-weight: 600; font-size: 13px;
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-nav:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }
        
        .btn-calc { background: #eef2ff; color: var(--accent); border-color: #c7d2fe; }
        .btn-calc:hover { background: var(--accent); color: white; }

        .btn-city { border: none; background: transparent; color: #64748b; font-weight: 700; cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: 0.3s;}
        .btn-city.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        
        #btn-trevelin.active { background: var(--warning); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4); }

        .btn-logout { 
            background: #fee2e2; color: var(--danger); border: none; 
            width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-logout:hover { background: var(--danger); color: white; }

        .btn-add-main { 
            position: fixed; bottom: 30px; right: 30px; z-index: 1000; 
            background: var(--dark-bg); color: white; border: none; 
            padding: 16px 28px; border-radius: 16px; font-weight: 700; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); transition: 0.3s;
        }

        /* BOTTOM BAR (Solo móvil) */
        .bottom-nav {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white;
            z-index: 1001;
            padding: 10px 5px;
            display: none; /* Se activa en media query */
            justify-content: space-around;
            border-top: 1px solid #e2e8f0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 4px; color: #64748b; font-size: 10px; font-weight: 600;
            text-decoration: none; border: none; background: none; cursor: pointer;
        }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--primary); }

        /* VISTA MOVIL */
        @media (max-width: 768px) {
            .actions-group { display: none; } /* Oculta botones arriba */
            .top-bar { top: 10px; width: 95%; padding: 8px 15px; }
            .bottom-nav { display: flex; } /* Muestra barra abajo */
            .btn-add-main { bottom: 85px; right: 20px; padding: 12px 20px; font-size: 14px; }
            #map { height: calc(100vh - 70px); }
        }

        /* POPUPS */
        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 280px !important; }
        .pop-card { display: flex; flex-direction: column; }
        .pop-header { background: #f8fafc; padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .pop-title { display: block; font-size: 16px; color: var(--dark-bg); }
        .pop-subtitle { display: block; font-size: 12px; color: #64748b; margin-top: 2px; }
        .pop-body { padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .pop-info { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #475569; }
        .pop-info i { width: 16px; color: #94a3b8; font-size: 14px; }
        .pop-footer { padding: 10px; background: #f8fafc; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .pop-btn { 
            border: none; background: white; padding: 8px; border-radius: 8px; 
            font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }

        /* MODALES Y OTROS */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 2001; background: white; width: 90%; max-width: 440px; 
            border-radius: 24px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); 
            max-height: 85vh; overflow-y: auto;
        }
        .modal h3 { font-weight: 800; color: var(--dark-bg); font-size: 20px; margin-bottom: 20px; }
        .modal label { font-size: 12px; font-weight: 700; color: #64748b; display: block; margin-top: 12px; margin-bottom: 4px; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        
        .btn-save { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 700; margin-top: 25px; cursor: pointer; 
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(6px); z-index: 2000; 
        }

        #instruccion { 
            display: none; position: fixed; top: 100px; left: 50%; transform: translateX(-50%); 
            z-index: 2000; background: var(--primary); color: white; padding: 12px 25px; 
            border-radius: 50px; font-weight: 700; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% { top: 100px; } 50% { top: 110px; } }
        .crosshair { cursor: crosshair !important; }
    </style>
</head>
<body>

    <div id="instruccion"><i class="fa-solid fa-location-dot"></i> Haz clic en el mapa para situar la cámara</div>

    <div class="top-bar">
        <div class="search-group">
            <i class="fa-solid fa-magnifying-glass" style="color: #94a3b8"></i>
            <input type="text" id="q" placeholder="Buscar dirección o titular..." onkeyup="if(event.key==='Enter') buscarLugar()">
        </div>

        <div class="actions-group">
            <button class="btn-city active" id="btn-esquel" onclick="irA([-42.912, -71.316], 'btn-esquel')">Esquel</button>
            <button class="btn-city" id="btn-trevelin" onclick="irA([-43.085, -71.463], 'btn-trevelin')">Trevelin</button>
            
            <button class="btn-nav btn-calc" onclick="window.location.href='calculadora.html'">
                <i class="fa-solid fa-calculator"></i> Calculadora
            </button>

            <button class="btn-nav" onclick="window.location.href='historial.html'">
                <i class="fa-solid fa-clock-rotate-left"></i> Historial
            </button>

            <button class="btn-nav" onclick="abrirModalClave()">
                <i class="fa-solid fa-key"></i> Cambiar clave
            </button>

            <button id="btn-admin-panel" class="btn-nav" style="background: #f1f5f9; border: none; display: none;" onclick="window.location.href='admin.html'">
                <i class="fa-solid fa-user-gear"></i> Panel
            </button>

            <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" id="m-btn-esquel" onclick="irA([-42.912, -71.316], 'btn-esquel')">
            <i class="fa-solid fa-mountain-city"></i> Esquel
        </button>
        <button class="nav-item" id="m-btn-trevelin" onclick="irA([-43.085, -71.463], 'btn-trevelin')">
            <i class="fa-solid fa-tree"></i> Trevelin
        </button>
        <button class="nav-item" onclick="window.location.href='calculadora.html'">
            <i class="fa-solid fa-calculator"></i> Calc
        </button>
        <button class="nav-item" onclick="window.location.href='historial.html'">
            <i class="fa-solid fa-clock-rotate-left"></i> Hist
        </button>
        <button id="btn-admin-mobile" class="nav-item" style="display:none" onclick="window.location.href='admin.html'">
            <i class="fa-solid fa-user-gear"></i> Admin
        </button>
        <button class="nav-item" style="color:var(--danger)" onclick="logout()">
            <i class="fa-solid fa-power-off"></i> Salir
        </button>
    </nav>

    <button class="btn-add-main" id="main-btn" onclick="activarModoSeleccion()">
        <i class="fa-solid fa-plus"></i> Nueva Cámara
    </button>

    <div class="overlay" id="blur" onclick="cerrarTodo()"></div>
    
    <div class="modal" id="modal-clave">
        <h3>Actualizar Contraseña</h3>
        <label>Nueva Contraseña</label>
        <input type="password" id="pass-nueva" placeholder="Mínimo 4 caracteres">
        <label>Confirmar Contraseña</label>
        <input type="password" id="pass-confirma" placeholder="Repite la contraseña">
        <button class="btn-save" id="btn-confirmar-clave" onclick="actualizarMiClave()">Guardar Cambios</button>
        <button style="width:100%; background:none; border:none; color:#94a3b8; margin-top:15px; cursor:pointer; font-weight:600" onclick="cerrarTodo()">Cancelar</button>
    </div>

    <div class="modal" id="form">
        <h3 id="form-title">Detalles Técnicos</h3>
        <input type="hidden" id="edit-id">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div>
                <label>Ciudad</label>
                <select id="ciudad_select">
                    <option value="Esquel">Esquel</option>
                    <option value="Trevelin">Trevelin</option>
                </select>
            </div>
            <div>
                <label>Tipo de Sistema</label>
                <select id="t">
                    <option value="CENTRO DE MONITOREO">Monitoreo</option>
                    <option value="PRIVADAS">Privada</option>
                    <option value="PARTICULARES">Particular</option>
                </select>
            </div>
        </div>
        <label>Ubicación Geográfica</label>
        <input type="text" id="u" readonly style="background:#f8fafc; color:#64748b">
        <label>Dirección Exacta</label>
        <input type="text" id="d" placeholder="Ej: Av. Alvear 1234">
        <label>Titular / Comercio</label>
        <input type="text" id="n" placeholder="Nombre del responsable">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div><label>Teléfono</label><input type="text" id="tel"></div>
            <div><label>Modelo DVR</label><input type="text" id="sis" placeholder="Hikvision, Dahua..."></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div><label>Usuario DVR</label><input type="text" id="usu"></div>
            <div><label>Clave DVR</label><input type="text" id="pas"></div>
        </div>
        <label>Días de Grabación</label>
        <input type="number" id="alm" value="7">
        <label>Observaciones</label>
        <textarea id="ot" rows="2" placeholder="Notas sobre la instalación..."></textarea>
        <button class="btn-save" id="btn-submit-camera" onclick="enviar()">Guardar en Base de Datos</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');

        function verificarPrivilegios() {
            const session = localStorage.getItem('user_session');
            if (session) {
                const userData = JSON.parse(session);
                const btnPanel = document.getElementById('btn-admin-panel');
                const btnPanelMob = document.getElementById('btn-admin-mobile');
                if (userData.rol === 'admin') {
                    if(btnPanel) btnPanel.style.display = 'flex';
                    if(btnPanelMob) btnPanelMob.style.display = 'flex';
                }
                return userData;
            }
            return null;
        }

        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const map = L.map('map', { center: [-42.912, -71.316], zoom: 14, layers: [osm], zoomControl: false });
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.control.layers({ "Calles": osm, "Satélite": satellite }, null, { position: 'bottomright' }).addTo(map);

        let items = [], seleccionando = false, tempMarker = null, marcadorBusqueda = null;

        function logout() { localStorage.removeItem('user_session'); window.location.replace('login.html'); }
        
        function irA(coords, btnId) { 
            if (marcadorBusqueda) map.removeLayer(marcadorBusqueda);
            map.flyTo(coords, 15); 
            
            // Actualizar botones arriba
            document.querySelectorAll('.btn-city').forEach(p => p.classList.remove('active'));
            const btn = document.getElementById(btnId);
            if(btn) btn.classList.add('active');

            // Actualizar botones abajo (móvil)
            document.querySelectorAll('.nav-item').forEach(p => p.classList.remove('active'));
            const mBtnId = btnId === 'btn-esquel' ? 'm-btn-esquel' : 'm-btn-trevelin';
            const mBtn = document.getElementById(mBtnId);
            if(mBtn) mBtn.classList.add('active');
        }

        async function registrarLog(usuario, accion, detalle) {
            try { await _client.from('logs_actividad').insert([{ usuario, accion, detalle }]); } catch (e) {}
        }

        function abrirModalClave() {
            document.getElementById('pass-nueva').value = '';
            document.getElementById('pass-confirma').value = '';
            document.getElementById('modal-clave').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        }

        async function actualizarMiClave() {
            const n1 = document.getElementById('pass-nueva').value.trim();
            const n2 = document.getElementById('pass-confirma').value.trim();
            const user = verificarPrivilegios();
            if (!n1 || n1.length < 4) return alert("Mínimo 4 caracteres.");
            if (n1 !== n2) return alert("No coinciden.");
            
            const btn = document.getElementById('btn-confirmar-clave');
            btn.disabled = true; btn.innerText = "Actualizando...";
            const { error } = await _client.from('usuarios').update({ clave: n1 }).eq('usuario', user.usuario);
            if (!error) {
                await registrarLog(user.usuario, 'CAMBIO CLAVE', 'Actualizó contraseña');
                alert("✅ Contraseña actualizada correctamente");
                cerrarTodo();
            }
            btn.disabled = false; btn.innerText = "Guardar Cambios";
        }

        async function load() {
            const user = verificarPrivilegios();
            const rolUsuario = user?.rol;
            items.forEach(i => map.removeLayer(i.m));
            items = [];
            const { data, error } = await _client.from('cameras').select('*');
            if (error) return;

            data?.forEach(c => {
                const latlng = c.UBICACION?.split(',').map(parseFloat);
                if (latlng && latlng[0]) {
                    let color = c.TIPO === 'CENTRO DE MONITOREO' ? '#2563eb' : (c.TIPO === 'PRIVADAS' ? '#0f172a' : '#10b981');
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style="background:white; border:3px solid ${color}; color:${color}; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.2)"><i class="fa-solid fa-video" style="font-size:12px"></i></div>`,
                        iconSize: [30, 30], iconAnchor: [15, 15]
                    });
                    const marker = L.marker(latlng, { icon }).addTo(map);
                    
                    const btnEliminarHtml = rolUsuario === 'admin' ? `<button class="pop-btn" style="color:var(--danger)" onclick="eliminar('${c.id}')"><i class="fa-solid fa-trash"></i> Eliminar</button>` : '';

                    let dvrUserDisplay = '-';
                    let obsDisplay = '-';
                    if (c.otros_datos) {
                        const parts = c.otros_datos.split('|');
                        dvrUserDisplay = parts[0] ? parts[0].replace('User DVR: ', '').trim() : '-';
                        obsDisplay = parts[1] ? parts[1].trim() : '-';
                    }

                    const popupContent = `
                        <div class="pop-card">
                            <div class="pop-header">
                                <b class="pop-title">${c.DIRECCION || 'Sin dirección'}</b>
                                <span class="pop-subtitle">${c['LUGAR / TITULAR'] || '-'}</span>
                            </div>
                            <div class="pop-body">
                                <div class="pop-info"><i class="fa-solid fa-city"></i> <span><b>Ciudad:</b> ${c.ciudad || '-'}</span></div>
                                <div class="pop-info"><i class="fa-solid fa-layer-group"></i> <span><b>Tipo:</b> ${c.TIPO || '-'}</span></div>
                                <div class="pop-info"><i class="fa-solid fa-phone"></i> <span><b>Tel:</b> ${c.telefono || '-'}</span></div>
                                <div class="pop-info"><i class="fa-solid fa-microchip"></i> <span><b>Sistema:</b> ${c.sistema || '-'}</span></div>
                                <div class="pop-info"><i class="fa-solid fa-user-shield"></i> <span><b>Usuario:</b> ${dvrUserDisplay}</span></div>
                                <div class="pop-info"><i class="fa-solid fa-key"></i> <span><b>Clave:</b> ${c.clave || '-'}</span></div>
                                <div class="pop-info"><i class="fa-solid fa-calendar-day"></i> <span><b>Respaldo:</b> ${c.dias_almacenamiento || '7'} días</span></div>
                                <div class="pop-info"><i class="fa-solid fa-comment-dots"></i> <span><b>Obs:</b> ${obsDisplay}</span></div>
                            </div>
                            <div class="pop-footer">
                                <button class="pop-btn" style="color:var(--primary)" onclick="abrirEditar('${c.id}')"><i class="fa-solid fa-pen-to-square"></i> Editar</button>
                                ${btnEliminarHtml}
                            </div>
                        </div>`;

                    marker.bindPopup(popupContent);
                    items.push({ id: c.id, m: marker, data: c, info: `${c.DIRECCION} ${c['LUGAR / TITULAR']}`.toLowerCase() });
                }
            });
        }

        function abrirEditar(id) {
            const cam = items.find(i => i.id == id).data;
            document.getElementById('edit-id').value = cam.id;
            document.getElementById('d').value = cam.DIRECCION;
            document.getElementById('u').value = cam.UBICACION;
            document.getElementById('n').value = cam['LUGAR / TITULAR'];
            document.getElementById('t').value = cam.TIPO;
            document.getElementById('ciudad_select').value = cam.ciudad || "Esquel";
            document.getElementById('tel').value = cam.telefono || "";
            document.getElementById('sis').value = cam.sistema || "";
            document.getElementById('pas').value = cam.clave || "";
            document.getElementById('alm').value = cam.dias_almacenamiento || 7;
            
            if(cam.otros_datos) {
                const parts = cam.otros_datos.split('|');
                document.getElementById('usu').value = parts[0].replace('User DVR: ', '').trim();
                document.getElementById('ot').value = parts[1] ? parts[1].trim() : "";
            }

            document.getElementById('form-title').innerText = "Editar Cámara";
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        }

        async function eliminar(id) {
            if(!confirm("¿Eliminar esta cámara?")) return;
            const { error } = await _client.from('cameras').delete().eq('id', id);
            if(!error) load();
        }

        async function enviar() {
            const id = document.getElementById('edit-id').value;
            const userSession = JSON.parse(localStorage.getItem('user_session'));
            const cam = { 
                "DIRECCION": document.getElementById('d').value, 
                "UBICACION": document.getElementById('u').value,
                "LUGAR / TITULAR": document.getElementById('n').value,
                "TIPO": document.getElementById('t').value,
                "ciudad": document.getElementById('ciudad_select').value,
                "telefono": document.getElementById('tel').value,
                "sistema": document.getElementById('sis').value,
                "clave": document.getElementById('pas').value,
                "dias_almacenamiento": parseInt(document.getElementById('alm').value) || 7,
                "otros_datos": `User DVR: ${document.getElementById('usu').value} | ${document.getElementById('ot').value}`
            };

            const { error } = id ? await _client.from('cameras').update(cam).eq('id', id) : await _client.from('cameras').insert([cam]);
            if (!error) { 
                await registrarLog(userSession.usuario, id ? 'EDITO' : 'CREO', cam.DIRECCION);
                cerrarTodo(); load(); 
            }
        }

        function cerrarTodo() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('blur').style.display = 'none';
            document.getElementById('main-btn').style.display = 'flex';
            document.getElementById('instruccion').style.display = 'none';
            document.getElementById('map').classList.remove('crosshair');
            document.getElementById('form-title').innerText = "Detalles Técnicos";
            if (tempMarker) map.removeLayer(tempMarker);
            seleccionando = false;
        }

        function activarModoSeleccion() {
            seleccionando = true;
            document.getElementById('map').classList.add('crosshair');
            document.getElementById('instruccion').style.display = 'block';
            document.getElementById('main-btn').style.display = 'none';
        }

        map.on('click', (e) => {
            if (!seleccionando) return;
            document.getElementById('edit-id').value = "";
            document.getElementById('d').value = "";
            document.getElementById('n').value = "";
            document.getElementById('tel').value = "";
            document.getElementById('sis').value = "";
            document.getElementById('usu').value = "";
            document.getElementById('pas').value = "";
            document.getElementById('ot').value = "";
            
            document.getElementById('u').value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(e.latlng).addTo(map);
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        });

        async function buscarLugar() {
            const q = document.getElementById('q').value.toLowerCase().trim();
            if (!q) return;

            const item = items.find(i => i.info.includes(q));
            if (item) {
                if (marcadorBusqueda) map.removeLayer(marcadorBusqueda);
                map.flyTo(item.m.getLatLng(), 18);
                item.m.openPopup();
            } else {
                const esEsquel = document.getElementById('btn-esquel').classList.contains('active');
                const ciudadBusqueda = esEsquel ? "Esquel, Chubut, Argentina" : "Trevelin, Chubut, Argentina";
                try {
                    const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q + ", " + ciudadBusqueda)}&limit=1`);
                    const data = await resp.json();
                    if (data.length > 0) {
                        const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                        if (marcadorBusqueda) map.removeLayer(marcadorBusqueda);
                        marcadorBusqueda = L.circleMarker(coords, { radius: 10, color: '#64748b' }).addTo(map)
                            .bindPopup(`<b>Dirección:</b><br>${data[0].display_name.split(',')[0]}`).openPopup();
                        map.flyTo(coords, 17);
                    }
                } catch (e) { console.error(e); }
            }
        }

        load();
    </script>
</body>
</html>
