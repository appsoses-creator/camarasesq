<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC - Sistema de Monitoreo</title>
    
    <script>
        (function() {
            const session = localStorage.getItem('user_session');
            let esValida = false;
            try {
                if (session) {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.usuario) esValida = true;
                }
            } catch (e) { esValida = false; }
            if (!esValida) {
                localStorage.removeItem('user_session');
                window.location.replace('login.html');
                document.documentElement.style.display = 'none';
            }
        })();
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: #f1f5f9; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* HEADER */
        .top-bar {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 800px;
            display: flex; align-items: center; gap: 12px;
            background: var(--glass); backdrop-filter: blur(12px);
            padding: 8px 15px; border-radius: 16px;
            box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.3);
        }

        .search-group { 
            flex: 1; display: flex; align-items: center; 
            background: rgba(0,0,0,0.04); border-radius: 10px; padding: 0 12px;
        }
        .search-group input { 
            width: 100%; border: none; padding: 10px; outline: none; 
            background: transparent; font-size: 14px; color: var(--dark);
        }

        .city-pills { display: flex; gap: 5px; border-left: 1px solid #e2e8f0; padding-left: 10px; }
        .pill { 
            border: none; padding: 8px 15px; border-radius: 8px; font-weight: 600; font-size: 12px;
            cursor: pointer; transition: 0.2s; background: transparent; color: #64748b;
            display: flex; align-items: center; gap: 6px;
        }
        .pill.active.esquel { background: var(--primary); color: white; }
        .pill.active.trevelin { background: var(--danger); color: white; }

        .btn-logout { 
            background: #fee2e2; color: var(--danger); border: none; 
            width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
            transition: 0.2s;
        }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* ICONOS CÁMARA */
        .div-icon { 
            display: flex; align-items: center; justify-content: center; 
            background: white; border-radius: 50%; border: 3px solid; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.15); 
        }

        /* DISEÑO DE LA TARJETA EN EL POPUP */
        .cam-card { min-width: 240px; padding: 4px; font-family: 'Inter', sans-serif; }
        .cam-header { border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 10px; }
        .cam-title { font-weight: 700; color: var(--dark); font-size: 15px; display: block; }
        .cam-type { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--primary); background: #eff6ff; padding: 2px 6px; border-radius: 4px; }
        
        .cam-info-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; color: #475569; }
        .cam-info-row i { width: 14px; color: #94a3b8; text-align: center; }
        .cam-info-row b { color: #1e293b; font-weight: 600; }

        .popup-actions { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
            margin-top: 12px; border-top: 1px solid #f1f5f9; padding-top: 10px; 
        }
        .btn-pop { 
            border: none; padding: 7px; border-radius: 6px; font-weight: 700; font-size: 11px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; 
        }
        .btn-edit-pop { background: #fef3c7; color: #d97706; }
        .btn-delete-pop { background: #fee2e2; color: #ef4444; }

        /* MODALES */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2001; background: white; width: 90%; max-width: 480px;
            border-radius: 20px; padding: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            max-height: 90vh; overflow-y: auto;
        }
        .modal h3 { margin: 0 0 20px 0; color: var(--dark); font-weight: 700; }
        .modal label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-top: 10px; }
        .modal input, .modal select, .modal textarea { 
            width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #e2e8f0; 
            border-radius: 8px; font-size: 14px; box-sizing: border-box; font-family: inherit;
        }

        .btn-save { width: 100%; padding: 15px; background: #10b981; color: white; border: none; border-radius: 10px; font-weight: 700; margin-top: 20px; cursor: pointer; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 2000; }
        
        .btn-add-main {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000;
            background: var(--dark); color: white; border: none;
            padding: 14px 22px; border-radius: 12px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); transition: 0.3s;
        }
        
        #instruccion { 
            display: none; position: fixed; top: 90px; left: 50%; transform: translateX(-50%); 
            z-index: 2000; background: var(--dark); color: white; padding: 10px 20px; 
            border-radius: 50px; font-weight: 600; font-size: 13px;
        }
        .crosshair { cursor: crosshair !important; }
    </style>
</head>
<body>

    <div id="instruccion">📍 Tocá el mapa en la ubicación de la cámara</div>

    <div class="top-bar">
        <div class="search-group">
            <i class="fa-solid fa-magnifying-glass" style="color: #94a3b8"></i>
            <input type="text" id="q" placeholder="Buscar dirección o titular..." onkeypress="if(event.key==='Enter') buscarLugar()">
        </div>

        <div class="city-pills">
            <button id="nav-esquel" class="pill esquel" onclick="irA([-42.912, -71.316])">Esquel</button>
            <button id="nav-trevelin" class="pill trevelin" onclick="irA([-43.085, -71.463])">Trevelin</button>
        </div>

        <button class="btn-logout" onclick="logout()">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </div>

    <button class="btn-add-main" id="main-btn" onclick="activarModoSeleccion()">
        <i class="fa-solid fa-plus"></i> Añadir Cámara
    </button>

    <div class="overlay" id="blur" onclick="cerrarTodo()"></div>
    
    <div class="modal" id="form">
        <h3 id="form-title">Detalles de la Cámara</h3>
        <input type="hidden" id="edit-id">
        
        <label>Ciudad</label>
        <select id="ciudad_select"><option value="Esquel">Esquel</option><option value="Trevelin">Trevelin</option></select>
        
        <label>Dirección Exacta</label>
        <input type="text" id="d" placeholder="Calle y número">
        
        <label>Lugar / Titular</label>
        <input type="text" id="n" placeholder="Nombre del comercio o dueño">
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div><label>Tipo</label><select id="t"><option value="CENTRO DE MONITOREO">Monitoreo</option><option value="PRIVADAS">Privada</option><option value="PARTICULARES">Particular</option></select></div>
            <div><label>Teléfono</label><input type="text" id="tel"></div>
        </div>
        
        <label>Sistema / Software</label>
        <input type="text" id="sis" placeholder="Ej: Hikvision, Dahua">
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div><label>Usuario</label><input type="text" id="usu"></div>
            <div><label>Clave</label><input type="text" id="pas"></div>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div><label>Días Almacenamiento</label><input type="number" id="alm" value="7"></div>
            <div><label>Coordenadas</label><input type="text" id="u" readonly></div>
        </div>
        
        <label>Observaciones</label>
        <textarea id="ot" rows="2"></textarea>
        
        <button class="btn-save" onclick="enviar()">Guardar Registro</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');

        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        
        const map = L.map('map', { center: [-42.912, -71.316], zoom: 14, layers: [osm] });
        L.control.layers({ "Calles": osm, "Satélite": satellite }).addTo(map);

        let items = [], seleccionando = false, tempMarker = null;

        function logout() { localStorage.removeItem('user_session'); window.location.replace('login.html'); }
        function irA(coords) { map.flyTo(coords, 15); }

        async function load() {
            items.forEach(i => map.removeLayer(i.m));
            items = [];
            const { data } = await _client.from('cameras').select('*');
            
            data?.forEach(c => {
                const latlng = c.UBICACION?.split(',').map(parseFloat);
                if (latlng && latlng[0]) {
                    let color = c.TIPO === 'CENTRO DE MONITOREO' ? '#2563eb' : (c.TIPO === 'PRIVADAS' ? '#0f172a' : '#10b981');
                    
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="div-icon" style="border-color:${color}; color:${color}; width:26px; height:26px;"><i class="fa-solid fa-video" style="font-size:12px"></i></div>`,
                        iconSize: [26, 26], iconAnchor: [13, 13]
                    });

                    const marker = L.marker(latlng, { icon }).addTo(map);
                    
                    // TARJETA DE VISUALIZACIÓN PROFESIONAL
                    const popupContent = `
                        <div class="cam-card">
                            <div class="cam-header">
                                <span class="cam-title">${c.DIRECCION}</span>
                                <span class="cam-type" style="color:${color}; background:${color}15">${c.TIPO}</span>
                            </div>
                            <div class="cam-info-row"><i class="fa-solid fa-user"></i> <span><b>Titular:</b> ${c['LUGAR / TITULAR'] || '---'}</span></div>
                            <div class="cam-info-row"><i class="fa-solid fa-phone"></i> <span><b>Tel:</b> ${c.telefono || '---'}</span></div>
                            <div class="cam-info-row"><i class="fa-solid fa-server"></i> <span><b>Sistema:</b> ${c.sistema || '---'}</span></div>
                            <div class="cam-info-row"><i class="fa-solid fa-hard-drive"></i> <span><b>Días:</b> ${c.dias_almacenamiento || '7'} días</span></div>
                            <div class="cam-info-row"><i class="fa-solid fa-key"></i> <span><b>Acceso:</b> ${c.usuario || '---'} / ${c.clave || '---'}</span></div>
                            ${c.otros_datos ? `<div class="cam-info-row"><i class="fa-solid fa-circle-info"></i> <span>${c.otros_datos}</span></div>` : ''}
                            
                            <div class="popup-actions">
                                <button class="btn-pop btn-edit-pop" onclick="abrirEditar('${c.id}')"><i class="fa-solid fa-pen"></i> Editar</button>
                                <button class="btn-pop btn-delete-pop" onclick="eliminar('${c.id}')"><i class="fa-solid fa-trash"></i> Borrar</button>
                            </div>
                        </div>
                    `;

                    marker.bindPopup(popupContent);
                    items.push({ id: c.id, m: marker, data: c, info: (c.DIRECCION + " " + (c['LUGAR / TITULAR'] || '')).toLowerCase() });
                }
            });
        }

        async function buscarLugar() {
            const q = document.getElementById('q').value.toLowerCase();
            const item = items.find(i => i.info.includes(q));
            if (item) { map.setView(item.m.getLatLng(), 18); item.m.openPopup(); }
        }

        function activarModoSeleccion() {
            seleccionando = true;
            document.getElementById('map').classList.add('crosshair');
            document.getElementById('instruccion').style.display = 'block';
            document.getElementById('main-btn').style.display = 'none';
        }

        map.on('click', (e) => {
            if (!seleccionando) return;
            document.getElementById('edit-id').value = "";
            document.getElementById('u').value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(e.latlng).addTo(map);
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        });

        function abrirEditar(id) {
            const item = items.find(i => i.id == id).data;
            document.getElementById('edit-id').value = id;
            document.getElementById('ciudad_select').value = item.ciudad || "Esquel";
            document.getElementById('u').value = item.UBICACION;
            document.getElementById('d').value = item.DIRECCION;
            document.getElementById('n').value = item['LUGAR / TITULAR'];
            document.getElementById('t').value = item.TIPO;
            document.getElementById('tel').value = item.telefono || "";
            document.getElementById('sis').value = item.sistema || "";
            document.getElementById('usu').value = item.usuario || "";
            document.getElementById('pas').value = item.clave || "";
            document.getElementById('alm').value = item.dias_almacenamiento || 7;
            document.getElementById('ot').value = item.otros_datos || "";
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        }

        function cerrarTodo() {
            document.getElementById('form').style.display = 'none';
            document.getElementById('blur').style.display = 'none';
            document.getElementById('main-btn').style.display = 'flex';
            document.getElementById('map').classList.remove('crosshair');
            if (tempMarker) map.removeLayer(tempMarker);
            seleccionando = false;
            document.getElementById('instruccion').style.display = 'none';
        }

        async function enviar() {
            const id = document.getElementById('edit-id').value;
            const cam = { 
                "DIRECCION": document.getElementById('d').value, 
                "UBICACION": document.getElementById('u').value,
                "LUGAR / TITULAR": document.getElementById('n').value,
                "TIPO": document.getElementById('t').value,
                "ciudad": document.getElementById('ciudad_select').value,
                "telefono": document.getElementById('tel').value,
                "sistema": document.getElementById('sis').value,
                "usuario": document.getElementById('usu').value,
                "clave": document.getElementById('pas').value,
                "dias_almacenamiento": document.getElementById('alm').value,
                "otros_datos": document.getElementById('ot').value
            };
            if (id) await _client.from('cameras').update(cam).eq('id', id);
            else await _client.from('cameras').insert([cam]);
            cerrarTodo(); load();
        }

        async function eliminar(id) { if(confirm("¿Borrar permanentemente?")) { await _client.from('cameras').delete().eq('id', id); load(); } }
        
        load();
    </script>
</body>
</html>
