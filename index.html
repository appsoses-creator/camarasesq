<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPIE 23 - Gestión Integral de Cámaras</title>
    
    <script>
        (function() {
            const session = localStorage.getItem('user_session');
            let esValida = false;
            try {
                if (session) {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.usuario) esValida = true;
                }
            } catch (e) { esValida = false; }
            if (!esValida) {
                localStorage.removeItem('user_session');
                window.location.replace('login.html');
                document.documentElement.style.display = 'none';
            }
        })();
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --accent: #6366f1;
            --dark-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.98);
            --glass-border: rgba(255, 255, 255, 0.4);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-input: #f8fafc;
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--dark-bg); 
            overflow: hidden; 
            color: var(--text-main);
            height: 100vh;
        }

        /* --- MAPA --- */
        #map { height: 100vh; width: 100%; z-index: 1; filter: grayscale(0.1) contrast(1.05); }

        /* --- UI OVERLAYS --- */
        .center-pin {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%);
            z-index: 2000;
            pointer-events: none;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
            animation: bounce 0.5s ease infinite alternate;
        }

        @keyframes bounce { from { margin-top: 0; } to { margin-top: -10px; } }

        #btn-confirmar-pin {
            display: none;
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: var(--success);
            color: white;
            border: none;
            padding: 18px 36px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 15px;
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.4);
            cursor: pointer;
            letter-spacing: 0.8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #btn-confirmar-pin:active { transform: translateX(-50%) scale(0.95); }

        /* --- TOP BAR --- */
        .top-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 94%; max-width: 1300px;
            display: flex; align-items: center; gap: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 10px 20px; border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
        }

        .search-group { 
            flex: 1; display: flex; align-items: center; 
            background: rgba(15, 23, 42, 0.05); border-radius: 16px; 
            padding: 2px 8px 2px 16px; border: 1px solid transparent;
            transition: 0.3s; gap: 8px;
        }
        .search-group:focus-within { background: white; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .search-group input { 
            width: 100%; border: none; padding: 12px 0; outline: none; 
            background: transparent; font-size: 16px; font-weight: 500; color: var(--text-main);
        }

        .btn-search-trigger {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 12px; font-size: 13px;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }

        /* --- ACTIONS --- */
        .actions-group { display: flex; align-items: center; gap: 10px; }

        .btn-nav {
            background: white; color: var(--text-muted); border: 1px solid #e2e8f0;
            padding: 10px 18px; border-radius: 14px; font-weight: 600; font-size: 13px;
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-nav:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }
        
        .btn-city { border: none; background: transparent; color: var(--text-muted); font-weight: 700; cursor: pointer; padding: 10px 16px; border-radius: 12px; transition: 0.3s; }
        .btn-city.active { background: var(--primary); color: white; box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3); }

        .btn-logout { 
            background: #fee2e2; color: var(--danger); border: none; 
            width: 44px; height: 44px; border-radius: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }

        /* --- BUTTON ADD --- */
        .btn-add-main { 
            position: fixed; bottom: 35px; right: 35px; z-index: 1000; 
            background: var(--dark-bg); color: white; border: none; 
            padding: 18px 32px; border-radius: 20px; font-weight: 700; 
            cursor: pointer; display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-add-main:hover { transform: translateY(-5px) scale(1.02); background: #1e293b; }

        /* --- MODALES --- */
        .overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 2000; 
            animation: fadeIn 0.3s ease;
        }

        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 2001; background: white; width: 92%; max-width: 500px; 
            border-radius: 30px; padding: 35px; box-shadow: 0 40px 80px rgba(0,0,0,0.5); 
            max-height: 90vh; overflow-y: auto; animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, -40%); } to { opacity: 1; transform: translate(-50%, -50%); } }

        .modal h3 { font-weight: 800; color: var(--dark-bg); font-size: 24px; margin: 0 0 25px 0; letter-spacing: -0.5px; }
        .modal label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; display: block; margin-top: 18px; margin-bottom: 6px; letter-spacing: 0.5px; }
        
        .modal input, .modal select, .modal textarea { 
            width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; 
            font-family: inherit; font-size: 16px; background: var(--bg-input); transition: 0.2s;
        }
        .modal input:focus { border-color: var(--primary); background: white; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }

        .btn-save { 
            width: 100%; padding: 18px; background: var(--primary); color: white; 
            border: none; border-radius: 16px; font-weight: 700; font-size: 16px;
            margin-top: 30px; cursor: pointer; transition: 0.2s;
        }
        .btn-save:hover { background: var(--primary-hover); }

        /* --- POPUPS MAPA --- */
        .leaflet-popup-content-wrapper { border-radius: 20px; padding: 8px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .pop-card { min-width: 240px; }
        .pop-title { font-size: 16px; font-weight: 800; color: var(--dark-bg); display: block; margin-bottom: 4px; }
        .pop-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; display: block; }
        .pop-footer { display: flex; gap: 10px; border-top: 1px solid #f1f5f9; padding-top: 12px; }
        .pop-btn-edit { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 11px; flex: 1; }
        .pop-btn-del { background: #fee2e2; color: var(--danger); border: none; padding: 8px 12px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 11px; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .actions-group { display: none; }
            .top-bar { top: 10px; width: 92%; padding: 8px 12px; border-radius: 18px; }
            .btn-add-main { bottom: 25px; right: 25px; padding: 15px 24px; font-size: 14px; }
            .modal { padding: 25px; border-radius: 24px; }
        }
    </style>
</head>
<body>

    <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" class="center-pin" id="pin-central" width="50">
    
    <button id="btn-confirmar-pin" onclick="abrirFormularioNuevo()">
        <i class="fa-solid fa-location-dot"></i> CONFIRMAR POSICIÓN
    </button>

    <div id="instruccion" style="display:none; position:fixed; top:110px; left:50%; transform:translateX(-50%); z-index:2000; background:var(--dark-bg); color:white; padding:12px 24px; border-radius:50px; font-size:13px; font-weight:600; box-shadow: var(--shadow-lg);">
        <i class="fa-solid fa-hand-pointer"></i> Desliza el mapa para ubicar la cámara
    </div>

    <div class="top-bar">
        <div class="search-group">
            <i class="fa-solid fa-magnifying-glass" style="color: #94a3b8"></i>
            <input type="text" id="q" placeholder="Buscar por calle, nombre o IP..." onkeyup="if(event.key==='Enter') buscarEnMapa()">
            <button class="btn-search-trigger" onclick="buscarEnMapa()">BUSCAR</button>
        </div>

        <div class="actions-group">
            <button class="btn-city active" id="btn-esquel" onclick="volarA([-42.912, -71.316], 'btn-esquel')">Esquel</button>
            <button class="btn-city" id="btn-trevelin" onclick="volarA([-43.085, -71.463], 'btn-trevelin')">Trevelin</button>
            <div style="width:1px; height:24px; background:#e2e8f0; margin:0 5px;"></div>
            <button class="btn-nav" onclick="window.location.href='calculadora.html'"><i class="fa-solid fa-calculator"></i> Almacenamiento</button>
            <button class="btn-logout" onclick="procesarLogout()"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </div>

    <button class="btn-add-main" id="main-btn" onclick="iniciarModoMapa()">
        <i class="fa-solid fa-plus-circle"></i> Nueva Cámara
    </button>

    <div class="overlay" id="blur-overlay" onclick="cerrarModales()"></div>
    
    <div class="modal" id="form-camara">
        <h3 id="modal-title">Ficha Técnica de Cámara</h3>
        <input type="hidden" id="edit-id">
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div>
                <label>Ciudad</label>
                <select id="f_ciudad">
                    <option value="Esquel">Esquel</option>
                    <option value="Trevelin">Trevelin</option>
                </select>
            </div>
            <div>
                <label>Tipo de Sistema</label>
                <select id="f_tipo">
                    <option value="CENTRO DE MONITOREO">Monitoreo</option>
                    <option value="PRIVADAS">Privada</option>
                    <option value="PARTICULARES">Particular</option>
                </select>
            </div>
        </div>

        <label>Coordenadas (GPS)</label>
        <input type="text" id="f_gps" readonly style="font-family: monospace; font-size: 14px; color: var(--primary);">

        <label>Dirección y Altura</label>
        <input type="text" id="f_dir" placeholder="Ej: Belgrano 1245">

        <label>Titular o Nombre del Comercio</label>
        <input type="text" id="f_titular" placeholder="Ej: Kiosco 'El Sol'">

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div>
                <label>Usuario Acceso</label>
                <input type="text" id="f_user" placeholder="admin">
            </div>
            <div>
                <label>Contraseña / Pin</label>
                <input type="text" id="f_pass" placeholder="****">
            </div>
        </div>

        <label>Notas Adicionales / Observaciones</label>
        <textarea id="f_notas" rows="3" placeholder="Especificaciones del equipo, marca, etc..."></textarea>

        <button class="btn-save" onclick="guardarDatos()">
            <i class="fa-solid fa-cloud-arrow-up"></i> GUARDAR EN SUPABASE
        </button>
        <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:15px; cursor:pointer;" onclick="cerrarModales()">Descartar cambios</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 1. Configuración Inicial y Supabase
        const SUPABASE_URL = 'https://ubdlfcjcgdnzqwjvwsmn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mapa_items = [];
        let item_busqueda_actual = null;

        // 2. Inicialización del Mapa
        const map = L.map('map', { 
            center: [-42.912, -71.316], 
            zoom: 14, 
            zoomControl: false,
            attributionControl: false
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        // 3. Carga de Datos desde Supabase
        async function fetchCameras() {
            const { data, error } = await _supabase.from('cameras').select('*');
            if (error) {
                console.error("Error cargando cámaras:", error);
                return;
            }

            // Limpiar marcadores previos
            mapa_items.forEach(item => map.removeLayer(item.layer));
            mapa_items = [];

            data.forEach(cam => {
                const pos = cam.UBICACION?.split(',').map(n => parseFloat(n.trim()));
                if (pos && pos.length === 2 && !isNaN(pos[0])) {
                    
                    // Lógica de colores por tipo
                    let colorMarker = '#10b981'; // Particular
                    if (cam.TIPO === 'CENTRO DE MONITOREO') colorMarker = '#2563eb';
                    if (cam.TIPO === 'PRIVADAS') colorMarker = '#0f172a';

                    const marker = L.circleMarker(pos, {
                        radius: 9,
                        fillColor: colorMarker,
                        color: 'white',
                        weight: 2,
                        fillOpacity: 0.9
                    }).addTo(map);

                    // Contenido del Popup enriquecido
                    const popupContent = `
                        <div class="pop-card">
                            <span class="pop-title">${cam.DIRECCION}</span>
                            <span class="pop-subtitle">${cam['LUGAR / TITULAR']}</span>
                            <div style="font-size:11px; color:#64748b; margin-bottom:10px;">
                                <strong>Tipo:</strong> ${cam.TIPO}<br>
                                <strong>Obs:</strong> ${cam.otros_datos || 'Sin notas'}
                            </div>
                            <div class="pop-footer">
                                <button class="pop-btn-edit" onclick="editarCamara('${cam.id}')">
                                    <i class="fa-solid fa-pen"></i> Editar
                                </button>
                                <button class="pop-btn-del" onclick="eliminarCamara('${cam.id}', '${cam.DIRECCION}')">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;

                    marker.bindPopup(popupContent);
                    
                    mapa_items.push({
                        id: cam.id,
                        layer: marker,
                        data: cam,
                        searchString: `${cam.DIRECCION} ${cam['LUGAR / TITULAR']}`.toLowerCase()
                    });
                }
            });
        }

        // 4. Lógica de Interfaz y Modos
        function iniciarModoMapa() {
            document.getElementById('pin-central').style.display = 'block';
            document.getElementById('btn-confirmar-pin').style.display = 'block';
            document.getElementById('instruccion').style.display = 'block';
            document.getElementById('main-btn').style.display = 'none';
            map.flyTo(map.getCenter(), 17);
        }

        function abrirFormularioNuevo() {
            const centro = map.getCenter();
            resetForm();
            document.getElementById('f_gps').value = `${centro.lat.toFixed(6)}, ${centro.lng.toFixed(6)}`;
            document.getElementById('form-camara').style.display = 'block';
            document.getElementById('blur-overlay').style.display = 'block';
        }

        function cerrarModales() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('blur-overlay').style.display = 'none';
            document.getElementById('pin-central').style.display = 'none';
            document.getElementById('btn-confirmar-pin').style.display = 'none';
            document.getElementById('instruccion').style.display = 'none';
            document.getElementById('main-btn').style.display = 'flex';
        }

        function resetForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('f_dir').value = "";
            document.getElementById('f_titular').value = "";
            document.getElementById('f_user').value = "";
            document.getElementById('f_pass').value = "";
            document.getElementById('f_notas').value = "";
            document.getElementById('modal-title').innerText = "Ficha Técnica de Cámara";
        }

        // 5. CRUD Operaciones
        async function guardarDatos() {
            const id = document.getElementById('edit-id').value;
            const payload = {
                DIRECCION: document.getElementById('f_dir').value,
                UBICACION: document.getElementById('f_gps').value,
                "LUGAR / TITULAR": document.getElementById('f_titular').value,
                TIPO: document.getElementById('f_tipo').value,
                ciudad: document.getElementById('f_ciudad').value,
                clave: document.getElementById('f_pass').value,
                otros_datos: `Acceso: ${document.getElementById('f_user').value} | Notas: ${document.getElementById('f_notas').value}`
            };

            if (!payload.DIRECCION || !payload.UBICACION) {
                alert("La dirección y ubicación son obligatorias.");
                return;
            }

            let response;
            if (id) {
                response = await _supabase.from('cameras').update(payload).eq('id', id);
            } else {
                response = await _supabase.from('cameras').insert([payload]);
            }

            if (!response.error) {
                cerrarModales();
                fetchCameras();
            } else {
                alert("Error al guardar: " + response.error.message);
            }
        }

        async function eliminarCamara(id, nombre) {
            if (confirm(`¿Estás seguro de eliminar la cámara en ${nombre}?`)) {
                const { error } = await _supabase.from('cameras').delete().eq('id', id);
                if (!error) fetchCameras();
            }
        }

        function editarCamara(id) {
            const item = mapa_items.find(i => i.id == id);
            if (!item) return;
            const c = item.data;

            document.getElementById('edit-id').value = c.id;
            document.getElementById('f_dir').value = c.DIRECCION || "";
            document.getElementById('f_gps').value = c.UBICACION || "";
            document.getElementById('f_titular').value = c['LUGAR / TITULAR'] || "";
            document.getElementById('f_tipo').value = c.TIPO || "PRIVADAS";
            document.getElementById('f_ciudad').value = c.ciudad || "Esquel";
            document.getElementById('f_pass').value = c.clave || "";
            
            // Parsear notas
            if (c.otros_datos && c.otros_datos.includes('|')) {
                const partes = c.otros_datos.split('|');
                document.getElementById('f_user').value = partes[0].replace('Acceso:', '').trim();
                document.getElementById('f_notas').value = partes[1].replace('Notas:', '').trim();
            }

            document.getElementById('modal-title').innerText = "Editando Cámara";
            document.getElementById('form-camara').style.display = 'block';
            document.getElementById('blur-overlay').style.display = 'block';
        }

        // 6. Utilidades de Navegación
        function volarA(coords, btnId) {
            map.flyTo(coords, 15);
            document.querySelectorAll('.btn-city').forEach(b => b.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
        }

        function buscarEnMapa() {
            const query = document.getElementById('q').value.toLowerCase().trim();
            if (!query) return;

            const resultado = mapa_items.find(i => i.searchString.includes(query));
            if (resultado) {
                map.flyTo(resultado.layer.getLatLng(), 18);
                resultado.layer.openPopup();
            } else {
                alert("No se encontró ninguna cámara con ese criterio.");
            }
        }

        function procesarLogout() {
            localStorage.removeItem('user_session');
            window.location.replace('login.html');
        }

        // Init
        fetchCameras();

    </script>
</body>
</html>
