<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPIE 4 - Gestión de Cámaras</title>
    
    <script>
        (function() {
            const session = localStorage.getItem('user_session');
            let esValida = false;
            try {
                if (session) {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.usuario) esValida = true;
                }
            } catch (e) { esValida = false; }
            if (!esValida) {
                localStorage.removeItem('user_session');
                window.location.replace('login.html');
                document.documentElement.style.display = 'none';
            }
        })();
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --accent: #6366f1;
            --dark-bg: #000000; /* Negro Puro */
            --futurist-gray: #334155; /* Gris para bordes */
            --glass-bg: rgba(0, 0, 0, 0.9); /* Fondo negro translúcido */
            --glass-border: #475569; /* Gris plateado */
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #f8fafc;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--dark-bg); 
            overflow: hidden; 
            color: var(--text-main);
        }

        /* Mapa un poco más oscuro para que resalten las barras */
        #map { height: 100vh; width: 100%; z-index: 1; filter: brightness(0.7) grayscale(0.2) contrast(1.1); }

        /* NAVBAR SUPERIOR FUTURISTA */
        .top-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 92%; max-width: 1200px;
            display: flex; align-items: center; gap: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 5px rgba(255,255,255,0.1);
        }

        .search-group { 
            flex: 1; display: flex; align-items: center; 
            background: rgba(255, 255, 255, 0.05); border-radius: 8px; 
            padding: 0 15px; border: 1px solid var(--futurist-gray);
            transition: 0.3s;
        }
        .search-group:focus-within { background: rgba(255,255,255,0.1); border-color: var(--primary); }
        .search-group input { 
            width: 100%; border: none; padding: 12px; outline: none; 
            background: transparent; font-size: 14px; font-weight: 500; color: white;
        }

        .actions-group { display: flex; align-items: center; gap: 8px; }

        .btn-nav {
            background: #1e293b; color: #cbd5e1; border: 1px solid var(--futurist-gray);
            padding: 10px 16px; border-radius: 8px; font-weight: 600; font-size: 13px;
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-nav:hover { background: #000000; border-color: var(--primary); color: white; }
        
        .btn-calc { background: #1e1b4b; color: #a5b4fc; border-color: #312e81; }
        .btn-calc:hover { background: var(--accent); color: white; }

        .btn-city { border: 1px solid var(--futurist-gray); background: #0f172a; color: #94a3b8; font-weight: 700; cursor: pointer; padding: 8px 15px; border-radius: 8px; transition: 0.3s;}
        .btn-city.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        
        #btn-trevelin.active { background: var(--warning); border-color: var(--warning); color: black; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }

        .btn-logout { 
            background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; 
            width: 40px; height: 40px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* BOTÓN FLOTANTE */
        .btn-add-main { 
            position: fixed; bottom: 30px; right: 30px; z-index: 1000; 
            background: white; color: black; border: 1px solid var(--glass-border); 
            padding: 16px 28px; border-radius: 12px; font-weight: 800; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-add-main:hover { transform: scale(1.05); background: var(--primary); color: white; }

        /* BOTTOM BAR (MOBILE) */
        .bottom-nav {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px;
            background: #000000; 
            backdrop-filter: blur(15px); z-index: 1001;
            padding: 8px; justify-content: space-around;
            border-radius: 15px; border: 1px solid var(--glass-border);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 4px; color: #94a3b8; font-size: 11px; font-weight: 600;
            text-decoration: none; border: none; background: none; cursor: pointer;
            transition: 0.3s; padding: 10px; border-radius: 10px;
        }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--primary); background: rgba(37, 99, 235, 0.1); }

        /* MODALES FUTURISTAS */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 2001; background: #000000; width: 90%; max-width: 440px; 
            border-radius: 15px; padding: 30px; border: 1px solid var(--glass-border);
            box-shadow: 0 0 50px rgba(0,0,0,0.9); max-height: 85vh; overflow-y: auto;
        }
        .modal h3 { font-weight: 800; color: white; font-size: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--futurist-gray); padding-bottom: 10px; }
        .modal label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-top: 15px; display: block; }
        .modal input, .modal select, .modal textarea { 
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--futurist-gray); 
            border-radius: 8px; color: white; font-family: inherit; margin-top: 5px;
        }
        .modal input:focus { border-color: var(--primary); outline: none; }
        
        .btn-save { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 8px; font-weight: 700; margin-top: 25px; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        .overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); z-index: 2000; 
        }

        @media (max-width: 768px) {
            .actions-group { display: none; }
            .bottom-nav { display: flex; }
            .btn-add-main { bottom: 100px; right: 20px; padding: 14px 22px; }
        }

        /* POPUP MAPA NEGRO */
        .leaflet-popup-content-wrapper { background: #000000; color: white; border: 1px solid var(--glass-border); border-radius: 12px; }
        .leaflet-popup-tip { background: #000000; border: 1px solid var(--glass-border); }
        .pop-card { min-width: 220px; padding: 5px; }
        .pop-header { border-bottom: 1px solid var(--futurist-gray); margin-bottom: 10px; padding-bottom: 8px; }
        .pop-title { display: block; font-size: 14px; color: var(--primary); font-weight: 800; }
        .pop-subtitle { font-size: 12px; color: #94a3b8; }
        .pop-info { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 4px;}
        .pop-info i { color: var(--primary); width: 14px; }
        .pop-btn { flex: 1; border: 1px solid var(--futurist-gray); background: #0f172a; padding: 8px; border-radius: 6px; font-weight: 700; color: white; cursor: pointer; }

        #instruccion { 
            display: none; position: fixed; top: 100px; left: 50%; transform: translateX(-50%); 
            z-index: 2000; background: white; color: black; padding: 12px 25px; 
            border-radius: 8px; font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .crosshair { cursor: crosshair !important; }
    </style>
</head>
<body>
    <div id="instruccion"><i class="fa-solid fa-location-dot"></i> CLIC EN EL MAPA PARA UBICAR</div>

    <div class="top-bar">
        <div class="search-group">
            <i class="fa-solid fa-magnifying-glass" style="color: #64748b"></i>
            <input type="text" id="q" placeholder="Buscar dirección o titular..." onkeyup="if(event.key==='Enter') buscarLugar()">
        </div>

        <div class="actions-group">
            <button class="btn-city active" id="btn-esquel" onclick="irA([-42.912, -71.316], 'btn-esquel')">ESQUEL</button>
            <button class="btn-city" id="btn-trevelin" onclick="irA([-43.085, -71.463], 'btn-trevelin')">TREVELIN</button>
            
            <button class="btn-nav btn-calc" onclick="window.location.href='calculadora.html'">
                <i class="fa-solid fa-calculator"></i> CALCULADORA
            </button>

            <button class="btn-nav" onclick="abrirModalClave()">
                <i class="fa-solid fa-key"></i> CLAVE
            </button>

            <button id="btn-admin-panel" class="btn-nav" style="background: #1e293b; display: none;" onclick="window.location.href='admin.html'">
                <i class="fa-solid fa-user-gear"></i> PANEL
            </button>

            <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" id="m-btn-esquel" onclick="irA([-42.912, -71.316], 'btn-esquel')">
            <i class="fa-solid fa-mountain-city"></i> Esquel
        </button>
        <button class="nav-item" id="m-btn-trevelin" onclick="irA([-43.085, -71.463], 'btn-trevelin')">
            <i class="fa-solid fa-tree"></i> Trevelin
        </button>
        <button class="nav-item" onclick="window.location.href='calculadora.html'">
            <i class="fa-solid fa-calculator"></i> Calc
        </button>
        <button id="btn-admin-mobile" class="nav-item" style="display:none" onclick="window.location.href='admin.html'">
            <i class="fa-solid fa-user-gear"></i> Admin
        </button>
        <button class="nav-item" style="color:var(--danger)" onclick="logout()">
            <i class="fa-solid fa-power-off"></i> Salir
        </button>
    </nav>

    <button class="btn-add-main" id="main-btn" onclick="activarModoSeleccion()">
        <i class="fa-solid fa-plus"></i> Nueva Cámara
    </button>

    <div class="overlay" id="blur" onclick="cerrarTodo()"></div>
    
    <div class="modal" id="modal-clave">
        <h3>Actualizar Contraseña</h3>
        <label>Nueva Contraseña</label>
        <input type="password" id="pass-nueva">
        <label>Confirmar Contraseña</label>
        <input type="password" id="pass-confirma">
        <button class="btn-save" id="btn-confirmar-clave" onclick="actualizarMiClave()">GUARDAR CAMBIOS</button>
        <button style="width:100%; background:none; border:none; color:#64748b; margin-top:15px; cursor:pointer; font-weight:600" onclick="cerrarTodo()">CANCELAR</button>
    </div>

    <div class="modal" id="form">
        <h3 id="form-title">Detalles Técnicos</h3>
        <input type="hidden" id="edit-id">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div>
                <label>Ciudad</label>
                <select id="ciudad_select">
                    <option value="Esquel">Esquel</option>
                    <option value="Trevelin">Trevelin</option>
                </select>
            </div>
            <div>
                <label>Sistema</label>
                <select id="t">
                    <option value=""></option>
                    <option value="CENTRO DE MONITOREO">Monitoreo</option>
                    <option value="PRIVADAS">Privada</option>
                    <option value="PARTICULARES">Particular</option>
                </select>
            </div>
        </div>
        <label>Coordenadas</label>
        <input type="text" id="u" readonly style="opacity: 0.6">
        <label>Dirección</label>
        <input type="text" id="d" placeholder="Ej: Av. Alvear 1234">
        <label>Titular / Comercio</label>
        <input type="text" id="n">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div><label>Teléfono</label><input type="text" id="tel"></div>
            <div><label>Modelo DVR</label><input type="text" id="sis"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div><label>Usuario DVR</label><input type="text" id="usu"></div>
            <div><label>Clave DVR</label><input type="text" id="pas"></div>
        </div>
        <label>Observaciones</label>
        <textarea id="ot" rows="2"></textarea>
        <button class="btn-save" id="btn-submit-camera" onclick="enviar()">GUARDAR EN BASE DE DATOS</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ... (Tu lógica de JavaScript original sigue aquí igual que antes) ...
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');

        function verificarPrivilegios() {
            const session = localStorage.getItem('user_session');
            if (session) {
                const userData = JSON.parse(session);
                const btnPanel = document.getElementById('btn-admin-panel');
                const btnPanelMob = document.getElementById('btn-admin-mobile');
                if (userData.rol === 'admin') {
                    if(btnPanel) btnPanel.style.display = 'flex';
                    if(btnPanelMob) btnPanelMob.style.display = 'flex';
                }
                return userData;
            }
            return null;
        }

        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const map = L.map('map', { center: [-42.912, -71.316], zoom: 14, layers: [osm], zoomControl: false });
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.control.layers({ "Calles": osm, "Satélite": satellite }, null, { position: 'bottomright' }).addTo(map);

        let items = [], seleccionando = false, tempMarker = null, marcadorBusqueda = null;

        function logout() { localStorage.removeItem('user_session'); window.location.replace('login.html'); }
        
        function irA(coords, btnId) { 
            if (marcadorBusqueda) map.removeLayer(marcadorBusqueda);
            map.flyTo(coords, 15); 
            
            document.querySelectorAll('.btn-city').forEach(p => p.classList.remove('active'));
            const btn = document.getElementById(btnId);
            if(btn) btn.classList.add('active');

            document.querySelectorAll('.nav-item').forEach(p => p.classList.remove('active'));
            const mBtnId = btnId === 'btn-esquel' ? 'm-btn-esquel' : 'm-btn-trevelin';
            const mBtn = document.getElementById(mBtnId);
            if(mBtn) mBtn.classList.add('active');
        }

        async function registrarLog(usuario, accion, detalle) {
            try { await _client.from('logs_actividad').insert([{ usuario, accion, detalle }]); } catch (e) {}
        }

        function abrirModalClave() {
            document.getElementById('pass-nueva').value = '';
            document.getElementById('pass-confirma').value = '';
            document.getElementById('modal-clave').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        }

        async function actualizarMiClave() {
            const n1 = document.getElementById('pass-nueva').value.trim();
            const n2 = document.getElementById('pass-confirma').value.trim();
            const user = verificarPrivilegios();
            if (!n1 || n1.length < 4) return alert("Mínimo 4 caracteres.");
            if (n1 !== n2) return alert("No coinciden.");
            
            const btn = document.getElementById('btn-confirmar-clave');
            btn.disabled = true; btn.innerText = "Actualizando...";
            const { error } = await _client.from('usuarios').update({ clave: n1 }).eq('usuario', user.usuario);
            if (!error) {
                await registrarLog(user.usuario, 'CAMBIO CLAVE', 'Actualizó contraseña');
                alert("✅ Contraseña actualizada correctamente");
                cerrarTodo();
            }
            btn.disabled = false; btn.innerText = "Guardar Cambios";
        }

        async function load() {
            const user = verificarPrivilegios();
            const rolUsuario = user?.rol;
            items.forEach(i => map.removeLayer(i.m));
            items = [];
            const { data, error } = await _client.from('cameras').select('*');
            if (error) return;

            data?.forEach(c => {
                const latlng = c.UBICACION?.split(',').map(parseFloat);
                if (latlng && latlng.length === 2 && !isNaN(latlng[0])) {
                    let color = '#10b981';
                    if(c.TIPO === 'CENTRO DE MONITOREO') color = '#2563eb';
                    else if(c.TIPO === 'PRIVADAS') color = '#94a3b8';

                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style="background:black; border:2px solid ${color}; color:${color}; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 0 10px ${color}66"><i class="fa-solid fa-video" style="font-size:11px"></i></div>`,
                        iconSize: [28, 28], iconAnchor: [14, 14]
                    });

                    const marker = L.marker(latlng, { icon }).addTo(map);
                    const btnEliminarHtml = rolUsuario === 'admin' ? `<button class="pop-btn" style="color:var(--danger); border-color:#7f1d1d" onclick="eliminar('${c.id}')">ELIMINAR</button>` : '';

                    let dvrUserDisplay = '-';
                    let obsDisplay = '-';
                    if (c.otros_datos) {
                        const parts = c.otros_datos.split('|');
                        dvrUserDisplay = parts[0] ? parts[0].replace('User DVR: ', '').trim() : '-';
                        obsDisplay = parts[1] ? parts[1].trim() : '-';
                    }

                    const popupContent = `
                        <div class="pop-card">
                            <div class="pop-header">
                                <b class="pop-title">${c.DIRECCION || 'Sin dirección'}</b>
                                <span class="pop-subtitle">${c['LUGAR / TITULAR'] || '-'}</span>
                            </div>
                            <div class="pop-body">
                                <div class="pop-info"><i class="fa-solid fa-layer-group"></i> <span><b>TIPO:</b> ${c.TIPO || '-'}</span></div>
                                <div class="pop-info"><i class="fa-solid fa-phone"></i> <span><b>TEL:</b> ${c.telefono || '-'}</span></div>
                                <div class="pop-info"><i class="fa-solid fa-user-shield"></i> <span><b>USUARIO:</b> ${dvrUserDisplay}</span></div>
                                <div class="pop-info"><i class="fa-solid fa-key"></i> <span><b>CLAVE:</b> ${c.clave || '-'}</span></div>
                                <div class="pop-info"><i class="fa-solid fa-comment-dots"></i> <span><b>OBS:</b> ${obsDisplay}</span></div>
                            </div>
                            <div class="pop-footer" style="display:flex; gap:8px; margin-top:10px">
                                <button class="pop-btn" onclick="abrirEditar('${c.id}')">EDITAR</button>
                                ${btnEliminarHtml}
                            </div>
                        </div>`;

                    marker.bindPopup(popupContent);
                    items.push({ id: c.id, m: marker, data: c, info: `${c.DIRECCION} ${c['LUGAR / TITULAR']}`.toLowerCase() });
                }
            });
        }

        function abrirEditar(id) {
            const cam = items.find(i => i.id == id).data;
            document.getElementById('edit-id').value = cam.id;
            document.getElementById('d').value = cam.DIRECCION || "";
            document.getElementById('u').value = cam.UBICACION || "";
            document.getElementById('n').value = cam['LUGAR / TITULAR'] || "";
            document.getElementById('t').value = cam.TIPO || "";
            document.getElementById('ciudad_select').value = cam.ciudad || "Esquel";
            document.getElementById('tel').value = cam.telefono || "";
            document.getElementById('sis').value = cam.sistema || "";
            document.getElementById('pas').value = cam.clave || "";
            if(cam.otros_datos) {
                const parts = cam.otros_datos.split('|');
                document.getElementById('usu').value = parts[0].replace('User DVR: ', '').trim();
                document.getElementById('ot').value = parts[1] ? parts[1].trim() : "";
            }
            document.getElementById('form-title').innerText = "Editar Cámara";
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        }

        async function eliminar(id) {
            if(!confirm("¿Eliminar permanentemente?")) return;
            const { error } = await _client.from('cameras').delete().eq('id', id);
            if(!error) load();
        }

        async function enviar() {
            const id = document.getElementById('edit-id').value;
            const userSession = JSON.parse(localStorage.getItem('user_session'));
            const cam = { 
                "DIRECCION": document.getElementById('d').value, 
                "UBICACION": document.getElementById('u').value,
                "LUGAR / TITULAR": document.getElementById('n').value,
                "TIPO": document.getElementById('t').value,
                "ciudad": document.getElementById('ciudad_select').value,
                "telefono": document.getElementById('tel').value,
                "sistema": document.getElementById('sis').value,
                "clave": document.getElementById('pas').value,
                "otros_datos": `User DVR: ${document.getElementById('usu').value} | ${document.getElementById('ot').value}`
            };
            const btn = document.getElementById('btn-submit-camera');
            btn.disabled = true; btn.innerText = "GUARDANDO...";
            let res = id ? await _client.from('cameras').update(cam).eq('id', id) : await _client.from('cameras').insert([cam]);
            if (!res.error) { 
                await registrarLog(userSession.usuario, id ? 'EDITO' : 'CREO', cam.DIRECCION);
                cerrarTodo(); load(); 
            }
            btn.disabled = false; btn.innerText = "GUARDAR EN BASE DE DATOS";
        }

        function cerrarTodo() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('blur').style.display = 'none';
            document.getElementById('main-btn').style.display = 'flex';
            document.getElementById('instruccion').style.display = 'none';
            document.getElementById('map').classList.remove('crosshair');
            if (tempMarker) map.removeLayer(tempMarker);
            seleccionando = false;
        }

        function activarModoSeleccion() {
            seleccionando = true;
            document.getElementById('map').classList.add('crosshair');
            document.getElementById('instruccion').style.display = 'block';
            document.getElementById('main-btn').style.display = 'none';
        }

        map.on('click', (e) => {
            if (!seleccionando) return;
            document.getElementById('edit-id').value = "";
            document.getElementById('u').value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(e.latlng).addTo(map);
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        });

        async function buscarLugar() {
            const q = document.getElementById('q').value.toLowerCase().trim();
            if (!q) return;
            const item = items.find(i => i.info.includes(q));
            if (item) {
                if (marcadorBusqueda) map.removeLayer(marcadorBusqueda);
                map.flyTo(item.m.getLatLng(), 18);
                item.m.openPopup();
            }
        }
        load();
    </script>
</body>
</html>
