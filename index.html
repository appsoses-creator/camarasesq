<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CÁMARAS 10</title>
    
    <script>
        (function() {
            const session = localStorage.getItem('user_session');
            let esValida = false;
            try {
                if (session) {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.usuario) esValida = true;
                }
            } catch (e) { esValida = false; }
            if (!esValida) {
                localStorage.removeItem('user_session');
                window.location.replace('login.html');
                document.documentElement.style.display = 'none';
            }
        })();
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb; /* Azul Esquel */
            --trevelin-color: #6366f1; /* Índigo Trevelin */
            --dark: #0f172a;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: #f1f5f9; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .top-bar {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 95%; max-width: 1150px;
            display: flex; align-items: center; gap: 12px;
            background: white; padding: 8px 12px; border-radius: 50px;
            box-shadow: var(--shadow);
        }
        .search-group { flex: 1; display: flex; align-items: center; background: #f1f5f9; border-radius: 50px; padding: 0 18px; }
        .search-group input { width: 100%; border: none; padding: 12px; outline: none; background: transparent; font-size: 15px; color: var(--dark); }
        .city-pills { display: flex; gap: 8px; border-left: 1px solid #e2e8f0; padding-left: 12px; align-items: center; }
        
        .pill { border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; background: transparent; color: #64748b; }
        .pill.active#btn-esquel { background: var(--primary); color: white; }
        .pill.active#btn-trevelin { background: var(--trevelin-color); color: white; }
        
        .btn-top-action { background: #f1f5f9; color: var(--dark); border-radius: 12px; padding: 10px 15px; border: none; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap; }
        .btn-top-action:hover { background: #e2e8f0; }
        .btn-resaltado { background: var(--warning); color: white; }

        .btn-logout { background: #fee2e2; color: var(--danger); border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-add-main { position: fixed; bottom: 30px; left: 30px; z-index: 1000; background: var(--dark); color: white; border: none; padding: 16px 24px; border-radius: 50px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .div-icon { display: flex; align-items: center; justify-content: center; background: white; border-radius: 50%; border: 3px solid; box-shadow: 0 3px 6px rgba(0,0,0,0.15); }

        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; }
        .leaflet-popup-content { margin: 0; width: 300px !important; }
        .pop-card { width: 300px; font-family: 'Inter', sans-serif; }
        .pop-header { background: #f8fafc; padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }
        .pop-title { font-weight: 700; color: var(--dark); font-size: 14px; margin: 0; display: block; }
        .pop-subtitle { font-size: 11px; color: #64748b; font-weight: 500; }
        .pop-body { padding: 12px 15px; display: grid; gap: 8px; }
        .pop-section-title { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: -2px; }
        .pop-info { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #334155; }
        .pop-info i { color: var(--primary); width: 14px; text-align: center; }
        .pop-info b { color: var(--dark); }
        .pop-footer { display: flex; border-top: 1px solid #f1f5f9; background: white; }
        .pop-btn { flex: 1; border: none; padding: 10px; cursor: pointer; font-weight: 700; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .pop-btn-edit { background: white; color: var(--primary); }
        .pop-btn-edit:hover { background: #eff6ff; }
        .pop-btn-del { background: white; color: var(--danger); border-left: 1px solid #f1f5f9; }
        .pop-btn-del:hover { background: #fef2f2; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2001; background: white; width: 90%; max-width: 450px; border-radius: 20px; padding: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); max-height: 90vh; overflow-y: auto; }
        .modal label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-top: 12px; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 12px; margin-top: 4px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 16px; background: #10b981; color: white; border: none; border-radius: 12px; font-weight: 700; margin-top: 25px; cursor: pointer; }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 2000; }
        #instruccion { display: none; position: fixed; top: 90px; left: 50%; transform: translateX(-50%); z-index: 2000; background: var(--dark); color: white; padding: 12px 24px; border-radius: 50px; font-weight: 600; }
        .crosshair { cursor: crosshair !important; }
    </style>
</head>
<body>

    <div id="instruccion">📍 Tocá el mapa en la ubicación de la cámara</div>

    <div class="top-bar">
        <div class="search-group">
            <i class="fa-solid fa-magnifying-glass" style="color: #94a3b8"></i>
            <input type="text" id="q" placeholder="Buscar dirección o titular..." onkeyup="if(event.key==='Enter') buscarLugar()">
        </div>
        <div class="city-pills">
            <button class="pill active" id="btn-esquel" onclick="irA([-42.912, -71.316], 'btn-esquel')">Esquel</button>
            <button class="pill" id="btn-trevelin" onclick="irA([-43.085, -71.463], 'btn-trevelin')">Trevelin</button>
            
            <button class="btn-top-action btn-resaltado" onclick="window.location.href='calculadora.html'">
                <i class="fa-solid fa-clock"></i> Calculadora
            </button>

            <button class="btn-top-action" onclick="abrirModalClave()">
                <i class="fa-solid fa-key"></i> Clave
            </button>

            <button id="btn-admin-panel" class="btn-top-action" onclick="window.location.href='admin.html'">
                <i class="fa-solid fa-user-gear"></i> Panel
            </button>
        </div>
        <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
    </div>

    <button class="btn-add-main" id="main-btn" onclick="activarModoSeleccion()">
        <i class="fa-solid fa-plus"></i> Añadir Cámara
    </button>

    <div class="overlay" id="blur" onclick="cerrarTodo()"></div>
    
    <div class="modal" id="modal-clave">
        <h3 style="margin:0"><i class="fa-solid fa-shield-lock"></i> Mi Contraseña</h3>
        <label>Nueva Contraseña</label>
        <input type="password" id="pass-nueva">
        <label>Confirmar Contraseña</label>
        <input type="password" id="pass-confirma">
        <button class="btn-save" id="btn-confirmar-clave" onclick="actualizarMiClave()">Actualizar Ahora</button>
        <button style="width:100%; background:none; border:none; color:#94a3b8; margin-top:10px; cursor:pointer;" onclick="cerrarTodo()">Cancelar</button>
    </div>

    <div class="modal" id="form">
        <h3 id="form-title" style="margin:0">Detalles de la Cámara</h3>
        <input type="hidden" id="edit-id">
        <label>Ciudad</label>
        <select id="ciudad_select">
            <option value="Esquel">Esquel</option>
            <option value="Trevelin">Trevelin</option>
        </select>
        <label>Ubicación (Coords)</label>
        <input type="text" id="u" readonly style="background:#f1f5f9">
        <label>Dirección</label>
        <input type="text" id="d">
        <label>Lugar / Titular</label>
        <input type="text" id="n">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Tipo</label><select id="t"><option value="CENTRO DE MONITOREO">Monitoreo</option><option value="PRIVADAS">Privada</option><option value="PARTICULARES">Particular</option></select></div>
            <div><label>Teléfono</label><input type="text" id="tel"></div>
        </div>
        <label>Sistema / DVR</label>
        <input type="text" id="sis">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Usuario (DVR)</label><input type="text" id="usu"></div>
            <div><label>Clave (DVR)</label><input type="text" id="pas"></div>
        </div>
        <label>Días Almacenamiento</label>
        <input type="number" id="alm" value="7">
        <label>Observaciones</label>
        <textarea id="ot" rows="2"></textarea>
        <button class="btn-save" id="btn-submit-camera" onclick="enviar()">Guardar Registro</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');

        function verificarPrivilegios() {
            const session = localStorage.getItem('user_session');
            if (session) {
                const userData = JSON.parse(session);
                const btnPanel = document.getElementById('btn-admin-panel');
                if (userData.rol !== 'admin' && btnPanel) btnPanel.remove();
                return userData;
            }
            return null;
        }

        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const map = L.map('map', { center: [-42.912, -71.316], zoom: 14, layers: [osm] });
        L.control.layers({ "Calles": osm, "Satélite": satellite }).addTo(map);

        let items = [], seleccionando = false, tempMarker = null;

        function logout() { localStorage.removeItem('user_session'); window.location.replace('login.html'); }
        
        function irA(coords, btnId) { 
            map.flyTo(coords, 15); 
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
        }

        function buscarLugar() {
            const query = document.getElementById('q').value.toLowerCase().trim();
            if (!query) return;
            const encontrado = items.find(i => i.info.includes(query));
            if (encontrado) {
                map.flyTo(encontrado.m.getLatLng(), 18);
                encontrado.m.openPopup();
            } else { alert("No se encontró ninguna cámara."); }
        }

        async function registrarLog(usuario, accion, detalle) {
            try { await _client.from('logs_actividad').insert([{ usuario, accion, detalle }]); } catch (e) {}
        }

        function abrirModalClave() {
            document.getElementById('pass-nueva').value = '';
            document.getElementById('pass-confirma').value = '';
            document.getElementById('modal-clave').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        }

        async function actualizarMiClave() {
            const n1 = document.getElementById('pass-nueva').value.trim();
            const n2 = document.getElementById('pass-confirma').value.trim();
            const user = verificarPrivilegios();
            if (!n1 || n1.length < 4) return alert("Mínimo 4 caracteres.");
            if (n1 !== n2) return alert("No coinciden.");
            
            const btn = document.getElementById('btn-confirmar-clave');
            btn.disabled = true; btn.innerText = "Actualizando...";
            const { error } = await _client.from('usuarios').update({ clave: n1 }).eq('usuario', user.usuario);
            if (!error) {
                await registrarLog(user.usuario, 'CAMBIO CLAVE', 'Actualizó contraseña');
                alert("✅ Éxito");
                cerrarTodo();
            }
            btn.disabled = false; btn.innerText = "Actualizar Ahora";
        }

        async function load() {
            const user = verificarPrivilegios();
            const rolUsuario = user?.rol;
            items.forEach(i => map.removeLayer(i.m));
            items = [];
            const { data, error } = await _client.from('cameras').select('*');
            if (error) return;

            data?.forEach(c => {
                const latlng = c.UBICACION?.split(',').map(parseFloat);
                if (latlng && latlng[0]) {
                    let color = c.TIPO === 'CENTRO DE MONITOREO' ? '#2563eb' : (c.TIPO === 'PRIVADAS' ? '#0f172a' : '#10b981');
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="div-icon" style="border-color:${color}; color:${color}; width:24px; height:24px;"><i class="fa-solid fa-video" style="font-size:11px"></i></div>`,
                        iconSize: [24, 24], iconAnchor: [12, 12]
                    });
                    const marker = L.marker(latlng, { icon }).addTo(map);
                    
                    const btnEliminarHtml = rolUsuario === 'admin' ? `<button class="pop-btn pop-btn-del" onclick="eliminar('${c.id}')"><i class="fa-solid fa-trash"></i> Borrar</button>` : '';

                    let dvrUserDisplay = '-';
                    if (c.otros_datos && c.otros_datos.includes('User DVR:')) {
                        dvrUserDisplay = c.otros_datos.split('|')[0].replace('User DVR: ', '').trim();
                    }

                    const popupContent = `
                        <div class="pop-card">
                            <div class="pop-header">
                                <b class="pop-title">${c.DIRECCION || 'Sin dirección'}</b>
                                <span class="pop-subtitle">${c['LUGAR / TITULAR'] || '-'}</span>
                            </div>
                            <div class="pop-body">
                                <div class="pop-info"><i class="fa-solid fa-desktop"></i> <b>Sistema:</b> ${c.sistema || '-'}</div>
                                <div class="pop-info"><i class="fa-solid fa-id-badge"></i> <b>User DVR:</b> ${dvrUserDisplay}</div>
                                <div class="pop-info"><i class="fa-solid fa-lock"></i> <b>Clave:</b> ${c.clave || '-'}</div>
                            </div>
                            <div class="pop-footer">
                                <button class="pop-btn pop-btn-edit" onclick="abrirEditar('${c.id}')"><i class="fa-solid fa-pen"></i> Editar</button>
                                ${btnEliminarHtml}
                            </div>
                        </div>`;

                    marker.bindPopup(popupContent);
                    items.push({ id: c.id, m: marker, data: c, info: `${c.DIRECCION} ${c['LUGAR / TITULAR']}`.toLowerCase() });
                }
            });
        }

        async function enviar() {
            const id = document.getElementById('edit-id').value;
            const userSession = JSON.parse(localStorage.getItem('user_session'));
            const cam = { 
                "DIRECCION": document.getElementById('d').value, 
                "UBICACION": document.getElementById('u').value,
                "LUGAR / TITULAR": document.getElementById('n').value,
                "TIPO": document.getElementById('t').value,
                "ciudad": document.getElementById('ciudad_select').value,
                "telefono": document.getElementById('tel').value,
                "sistema": document.getElementById('sis').value,
                "usuario": userSession.usuario,
                "clave": document.getElementById('pas').value,
                "dias_almacenamiento": parseInt(document.getElementById('alm').value) || 7,
                "otros_datos": `User DVR: ${document.getElementById('usu').value} | ${document.getElementById('ot').value}`
            };

            const { error } = id ? await _client.from('cameras').update(cam).eq('id', id) : await _client.from('cameras').insert([cam]);
            if (!error) { 
                await registrarLog(userSession.usuario, id ? 'EDITO' : 'CREO', cam.DIRECCION);
                cerrarTodo(); load(); 
            }
        }

        function abrirEditar(id) {
            const item = items.find(i => i.id == id).data;
            document.getElementById('edit-id').value = id;
            document.getElementById('u').value = item.UBICACION;
            document.getElementById('d').value = item.DIRECCION;
            document.getElementById('n').value = item['LUGAR / TITULAR'];
            document.getElementById('t').value = item.TIPO;
            document.getElementById('tel').value = item.telefono || "";
            document.getElementById('sis').value = item.sistema || "";
            document.getElementById('pas').value = item.clave || "";
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        }

        async function eliminar(id) {
            if(confirm("¿Borrar?")) {
                await _client.from('cameras').delete().eq('id', id);
                load();
            }
        }

        function activarModoSeleccion() {
            seleccionando = true;
            document.getElementById('map').classList.add('crosshair');
            document.getElementById('instruccion').style.display = 'block';
            document.getElementById('main-btn').style.display = 'none';
        }

        map.on('click', (e) => {
            if (!seleccionando) return;
            document.getElementById('edit-id').value = "";
            document.getElementById('u').value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(e.latlng).addTo(map);
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        });

        function cerrarTodo() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('blur').style.display = 'none';
            document.getElementById('main-btn').style.display = 'flex';
            document.getElementById('instruccion').style.display = 'none';
            document.getElementById('map').classList.remove('crosshair');
            if (tempMarker) map.removeLayer(tempMarker);
            seleccionando = false;
        }

        load();
    </script>
</body>
</html>
