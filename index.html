<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámaras - Monitoreo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* BARRA SUPERIOR */
        .nav-container {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
            display: flex; align-items: center; background: white; 
            padding: 5px; border-radius: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            width: 95%; max-width: 700px;
        }

        .city-selector { display: flex; gap: 5px; padding: 0 10px; border-right: 1px solid #e2e8f0; margin-right: 5px; }

        .btn-nav {
            border: none; padding: 8px 15px; border-radius: 50px;
            font-size: 12px; font-weight: bold; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; gap: 6px;
            background: #f8fafc; color: #94a3b8;
        }

        .btn-esquel.active { background: #2563eb; color: white; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.4); }
        .btn-trevelin.active { background: #dc2626; color: white; box-shadow: 0 2px 8px rgba(220, 38, 38, 0.4); }

        .search-area { flex: 1; display: flex; align-items: center; }
        .search-area input { width: 100%; border: none; padding: 10px; outline: none; font-size: 14px; background: transparent; }
        
        .search-btn { background: #2563eb; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .btn-logout { background: #fee2e2; color: #dc2626; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; margin-left: 10px; }

        /* VISTA MÓVIL: BOTONES ABAJO */
        @media (max-width: 600px) {
            .city-selector {
                position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: white; padding: 10px; border-radius: 50px;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.15); border: none;
                z-index: 2000; width: auto; gap: 15px;
            }
            .btn-nav { padding: 12px 25px; font-size: 14px; }
            .btn-add { bottom: 90px !important; left: 20px !important; } /* Sube el botón de agregar para que no tape */
            .nav-container { padding: 8px 12px; }
        }

        /* OTROS ESTILOS */
        #instruccion { display: none; position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 2000; background: #1e293b; color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; }
        .btn-add { position: fixed; bottom: 30px; left: 30px; z-index: 1000; background: #2563eb; color: white; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #users-section { display: none; position: fixed; top: 85px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: white; z-index: 2000; padding: 20px; border-radius: 15px; box-shadow: 0 5px 30px rgba(0,0,0,0.3); max-height: 70vh; overflow-y: auto; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1500; }
    </style>
</head>
<body>

    <script>
        (function() {
            const session = localStorage.getItem('user_session');
            if (!session || session === "undefined") {
                window.location.replace('login.html');
            }
        })();
    </script>

    <div class="nav-container">
        <div class="search-area">
            <input type="text" id="q" placeholder="Buscar cámara o dirección..." onkeypress="if(event.key==='Enter') buscarLugar()">
            <button class="search-btn" onclick="buscarLugar()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <button id="admin-tab" class="btn-nav" style="display:none; margin-left:5px" onclick="toggleUsuarios()"><i class="fa-solid fa-users"></i></button>
        <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
    </div>

    <div class="city-selector">
        <button id="nav-esquel" class="btn-nav btn-esquel" onclick="irA([-42.912, -71.316])">Esquel</button>
        <button id="nav-trevelin" class="btn-nav btn-trevelin" onclick="irA([-43.085, -71.463])">Trevelin</button>
    </div>

    <button class="btn-add" id="main-btn" onclick="activarModoSeleccion()">+ Añadir Cámara</button>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');
        const userLogueado = JSON.parse(localStorage.getItem('user_session'));
        
        if (userLogueado?.rol === 'admin') document.getElementById('admin-tab').style.display = 'block';

        const map = L.map('map', { center: [-42.912, -71.316], zoom: 14 });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function irA(coords) {
            map.flyTo(coords, 14);
        }

        function logout() {
            localStorage.clear();
            window.location.replace('login.html');
        }

        // ... Resto de tus funciones (load, enviar, etc.) ...
    </script>
</body>
</html>
