<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMCee - Gestión de Cámaras</title>
    
    <script>
        // Verificación de sesión
        (function() {
            const session = localStorage.getItem('user_session');
            if (!session) {
                window.location.replace('login.html');
            }
        })();
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --danger: #ef4444;
            --success: #10b981;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: #f1f5f9; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Interfaz Superior */
        .top-bar {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 95%; max-width: 900px;
            display: flex; align-items: center; gap: 12px;
            background: white; padding: 8px 12px; border-radius: 50px;
            box-shadow: var(--shadow);
        }

        .search-group { flex: 1; display: flex; align-items: center; background: #f1f5f9; border-radius: 50px; padding: 0 18px; }
        .search-group input { width: 100%; border: none; padding: 12px; outline: none; background: transparent; font-size: 15px; }

        .city-pills { display: flex; gap: 8px; border-left: 1px solid #e2e8f0; padding-left: 12px; }
        .pill { border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; background: transparent; color: #64748b; }
        .pill.active { background: var(--primary); color: white; }
        
        .btn-logout { background: #fee2e2; color: var(--danger); border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; }

        /* Botón Añadir */
        .btn-add-main { position: fixed; bottom: 30px; left: 30px; z-index: 1000; background: var(--dark); color: white; border: none; padding: 16px 24px; border-radius: 50px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* Popups del Mapa */
        .card-popup { min-width: 200px; padding: 5px; text-align: left; }
        .card-header { border-bottom: 1px solid #eee; margin-bottom: 8px; font-weight: 700; }
        .popup-actions { margin-top: 10px; display: flex; gap: 5px; }
        .btn-pop { flex: 1; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .btn-edit { background: #e0f2fe; color: #0369a1; }
        .btn-delete { background: #fee2e2; color: #b91c1c; }

        /* Modal / Formulario */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2001; background: white; width: 90%; max-width: 450px; border-radius: 20px; padding: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); max-height: 85vh; overflow-y: auto; }
        .modal label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-top: 12px; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 12px; margin-top: 4px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: 12px; font-weight: 700; margin-top: 25px; cursor: pointer; }
        .btn-save:disabled { background: #ccc; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 2000; }
        #instruccion { display: none; position: fixed; top: 90px; left: 50%; transform: translateX(-50%); z-index: 2000; background: var(--dark); color: white; padding: 12px 24px; border-radius: 50px; }
        .crosshair { cursor: crosshair !important; }
    </style>
</head>
<body>

    <div id="instruccion">📍 Haz clic en el mapa para ubicar la cámara</div>

    <div class="top-bar">
        <div class="search-group">
            <i class="fa-solid fa-magnifying-glass" style="color: #94a3b8"></i>
            <input type="text" id="q" placeholder="Buscar dirección o lugar..." onkeyup="if(event.key==='Enter') buscarLugar()">
        </div>
        <div class="city-pills">
            <button class="pill active" id="btn-esquel" onclick="irA([-42.912, -71.316], 'btn-esquel')">Esquel</button>
            <button class="pill" id="btn-trevelin" onclick="irA([-43.085, -71.463], 'btn-trevelin')">Trevelin</button>
        </div>
        <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
    </div>

    <button class="btn-add-main" id="main-btn" onclick="activarModoSeleccion()">
        <i class="fa-solid fa-plus"></i> Añadir Cámara
    </button>

    <div class="overlay" id="blur" onclick="cerrarTodo()"></div>
    
    <div class="modal" id="form">
        <h3 id="form-title" style="margin:0">Datos de la Cámara</h3>
        <input type="hidden" id="edit-id">
        
        <label>Dirección</label>
        <input type="text" id="d" placeholder="Ej: Belgrano 487">

        <label>Lugar / Titular</label>
        <input type="text" id="n" placeholder="Nombre del comercio o dueño">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div>
                <label>Tipo</label>
                <select id="t">
                    <option value="PRIVADAS">Privada</option>
                    <option value="CENTRO DE MONITOREO">Monitoreo</option>
                    <option value="PARTICULARES">Particular</option>
                </select>
            </div>
            <div><label>Teléfono</label><input type="text" id="tel"></div>
        </div>

        <label>Coordenadas</label>
        <input type="text" id="u" readonly style="background:#f8fafc">

        <label>Sistema / DVR</label>
        <input type="text" id="sis">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>Usuario</label><input type="text" id="usu"></div>
            <div><label>Clave</label><input type="text" id="pas"></div>
        </div>

        <label>Observaciones</label>
        <textarea id="ot" rows="2"></textarea>

        <button class="btn-save" id="btnSave" onclick="enviar()">Guardar Registro</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Configuración Supabase
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');

        // Inicializar Mapa
        const map = L.map('map', { center: [-42.912, -71.316], zoom: 14 });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let items = [], seleccionando = false, tempMarker = null;

        function logout() { localStorage.removeItem('user_session'); window.location.replace('login.html'); }
        
        function irA(coords, btnId) { 
            map.flyTo(coords, 15); 
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
        }

        async function load() {
            items.forEach(i => map.removeLayer(i.m));
            items = [];
            const { data, error } = await _client.from('cameras').select('*');
            if (error) return console.error(error);

            data.forEach(c => {
                const latlng = c.UBICACION?.split(',').map(parseFloat);
                if (latlng && latlng[0]) {
                    const marker = L.marker(latlng).addTo(map);
                    marker.bindPopup(`
                        <div class="card-popup">
                            <div class="card-header">${c.DIRECCION || 'Sin Dirección'}</div>
                            <div style="font-size:13px; color:666">${c['LUGAR / TITULAR'] || '-'}</div>
                            <div style="font-size:12px; margin-top:5px"><b>Clave:</b> ${c.clave || '---'}</div>
                            <div class="popup-actions">
                                <button class="btn-pop btn-edit" onclick="abrirEditar('${c.id}')">Editar</button>
                                <button class="btn-pop btn-delete" onclick="eliminar('${c.id}')">Borrar</button>
                            </div>
                        </div>
                    `);
                    items.push({ id: c.id, m: marker, data: c, info: `${c.DIRECCION} ${c['LUGAR / TITULAR']}`.toLowerCase() });
                }
            });
        }

        function activarModoSeleccion() {
            seleccionando = true;
            document.getElementById('map').classList.add('crosshair');
            document.getElementById('instruccion').style.display = 'block';
            document.getElementById('main-btn').style.display = 'none';
        }

        map.on('click', (e) => {
            if (!seleccionando) return;
            limpiarFormulario();
            document.getElementById('u').value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(e.latlng).addTo(map);
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        });

        async function enviar() {
            const id = document.getElementById('edit-id').value;
            const btn = document.getElementById('btnSave');
            
            const cam = { 
                "DIRECCION": document.getElementById('d').value, 
                "UBICACION": document.getElementById('u').value,
                "LUGAR / TITULAR": document.getElementById('n').value,
                "TIPO": document.getElementById('t').value,
                "telefono": document.getElementById('tel').value,
                "sistema": document.getElementById('sis').value,
                "usuario": document.getElementById('usu').value,
                "clave": document.getElementById('pas').value, // Asegúrate que en Supabase sea 'clave'
                "otros_datos": document.getElementById('ot').value
            };

            try {
                btn.disabled = true;
                btn.innerText = "Enviando...";

                let res;
                if (id) {
                    res = await _client.from('cameras').update(cam).eq('id', id);
                } else {
                    res = await _client.from('cameras').insert([cam]);
                }

                if (res.error) throw res.error;

                alert("✅ ¡Guardado con éxito!");
                cerrarTodo();
                await load();

            } catch (err) {
                console.error(err);
                alert("❌ Error al guardar:\n" + err.message + "\n\nRevisa que la columna 'clave' exista en Supabase.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar Registro";
            }
        }

        function abrirEditar(id) {
            const item = items.find(i => i.id == id).data;
            document.getElementById('edit-id').value = id;
            document.getElementById('d').value = item.DIRECCION || "";
            document.getElementById('n').value = item['LUGAR / TITULAR'] || "";
            document.getElementById('t').value = item.TIPO || "PRIVADAS";
            document.getElementById('u').value = item.UBICACION || "";
            document.getElementById('tel').value = item.telefono || "";
            document.getElementById('sis').value = item.sistema || "";
            document.getElementById('usu').value = item.usuario || "";
            document.getElementById('pas').value = item.clave || "";
            document.getElementById('ot').value = item.otros_datos || "";
            
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
        }

        function eliminar(id) {
            if (confirm("¿Seguro que quieres borrar este registro?")) {
                _client.from('cameras').delete().eq('id', id).then(() => load());
            }
        }

        function buscarLugar() {
            const q = document.getElementById('q').value.toLowerCase().trim();
            const encontrado = items.find(i => i.info.includes(q));
            if (encontrado) {
                map.flyTo(encontrado.m.getLatLng(), 18);
                encontrado.m.openPopup();
            }
        }

        function limpiarFormulario() {
            document.getElementById('edit-id').value = "";
            document.getElementById('d').value = "";
            document.getElementById('n').value = "";
            document.getElementById('tel').value = "";
            document.getElementById('sis').value = "";
            document.getElementById('usu').value = "";
            document.getElementById('pas').value = "";
            document.getElementById('ot').value = "";
        }

        function cerrarTodo() {
            document.getElementById('form').style.display = 'none';
            document.getElementById('blur').style.display = 'none';
            document.getElementById('main-btn').style.display = 'flex';
            document.getElementById('map').classList.remove('crosshair');
            if (tempMarker) map.removeLayer(tempMarker);
            seleccionando = false;
            document.getElementById('instruccion').style.display = 'none';
        }

        load();
    </script>
</body>
</html>
