<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC - Sistema de Monitoreo de Cámaras</title>
    
    <script>
        (function() {
            const session = localStorage.getItem('user_session');
            let esValida = false;
            try {
                if (session) {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.usuario) esValida = true;
                }
            } catch (e) { esValida = false; }
            if (!esValida) {
                localStorage.removeItem('user_session');
                window.location.replace('login.html');
                document.documentElement.style.display = 'none';
            }
        })();
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --dark: #0f172a;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* HEADER PROFESIONAL */
        .top-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 900px;
            display: flex; align-items: center; gap: 15px;
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 16px;
            box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.2);
        }

        .search-container { flex: 1; display: flex; align-items: center; background: #f1f5f9; border-radius: 10px; padding: 0 15px; border: 1px solid #e2e8f0; }
        .search-container input { width: 100%; border: none; padding: 12px; outline: none; background: transparent; font-size: 14px; }
        .search-container i { color: #64748b; }

        .city-pills { display: flex; gap: 8px; border-left: 2px solid #e2e8f0; padding-left: 15px; }
        .pill { 
            border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 13px;
            cursor: pointer; transition: all 0.2s; background: transparent; color: #64748b;
        }
        .pill.active.esquel { background: var(--primary); color: white; }
        .pill.active.trevelin { background: var(--danger); color: white; }

        .btn-icon { 
            background: #fee2e2; color: var(--danger); border: none; 
            width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
            transition: 0.3s; display: grid; place-items: center;
        }
        .btn-icon:hover { background: var(--danger); color: white; }

        /* BOTÓN FLOTANTE */
        .btn-add-main {
            position: fixed; bottom: 30px; right: 30px; z-index: 1000;
            background: var(--dark); color: white; border: none;
            padding: 15px 25px; border-radius: 14px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .btn-add-main:hover { transform: translateY(-5px); box-shadow: 0 25px 30px -5px rgba(0,0,0,0.4); }

        /* MODALES Y FORMULARIOS */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 1500; }
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; background: white; width: 95%; max-width: 500px;
            border-radius: 24px; padding: 30px; box-shadow: var(--shadow);
            max-height: 90vh; overflow-y: auto;
        }
        .modal h3 { margin: 0 0 20px 0; font-size: 1.5rem; font-weight: 700; color: var(--dark); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-family: inherit; font-size: 14px; box-sizing: border-box;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-submit { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        /* POPUP DEL MAPA */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 5px; }
        .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 8px; display: block; }
        .popup-actions { display: flex; gap: 8px; border-top: 1px solid #f1f5f9; pt: 8px; }
        .btn-edit-mini { background: #f59e0b; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .btn-del-mini { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }

        #instruccion { 
            display: none; position: fixed; top: 100px; left: 50%; transform: translateX(-50%); 
            z-index: 2000; background: var(--dark); color: white; padding: 12px 25px; 
            border-radius: 50px; font-weight: 600; box-shadow: var(--shadow);
        }

        @media (max-width: 600px) {
            .top-bar { flex-direction: column; padding: 15px; border-radius: 20px; top: 10px; }
            .city-pills { border-left: none; border-top: 2px solid #f1f5f9; padding: 10px 0 0 0; width: 100%; justify-content: center; }
            .btn-add-main { left: 20px; right: auto; bottom: 20px; width: 80%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="instruccion">📍 Haga clic en la ubicación exacta</div>

    <div class="top-bar">
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="q" placeholder="Buscar cámara o dirección..." onkeypress="if(event.key==='Enter') buscarLugar()">
        </div>
        
        <div class="city-pills">
            <button id="nav-esquel" class="pill esquel" onclick="irA([-42.912, -71.316])">Esquel</button>
            <button id="nav-trevelin" class="pill trevelin" onclick="irA([-43.085, -71.463])">Trevelin</button>
        </div>

        <button class="btn-icon" onclick="logout()" title="Salir">
            <i class="fa-solid fa-right-from-bracket"></i>
        </button>
    </div>

    <button class="btn-add-main" id="main-btn" onclick="activarModoSeleccion()">
        <i class="fa-solid fa-plus"></i> Registrar Cámara
    </button>

    <div class="overlay" id="blur" onclick="cerrarTodo()"></div>
    
    <div class="modal" id="form">
        <h3 id="form-title">Nueva Cámara</h3>
        <input type="hidden" id="edit-id">
        
        <div class="form-group">
            <label>Ciudad Jurisdicción</label>
            <select id="ciudad_select"><option value="Esquel">Esquel</option><option value="Trevelin">Trevelin</option></select>
        </div>

        <div class="form-row">
            <div class="form-group"><label>Coordenadas</label><input type="text" id="u" readonly></div>
            <div class="form-group"><label>Tipo de Red</label>
                <select id="t">
                    <option value="CENTRO DE MONITOREO">Monitoreo Público</option>
                    <option value="PRIVADAS">Privada Comercial</option>
                    <option value="PARTICULARES">Particular/Residencial</option>
                </select>
            </div>
        </div>

        <div class="form-group"><label>Dirección Física</label><input type="text" id="d" placeholder="Ej: Av. Alvear 1234"></div>
        <div class="form-group"><label>Titular / Razón Social</label><input type="text" id="n"></div>
        
        <div class="form-row">
            <div class="form-group"><label>Teléfono Contacto</label><input type="text" id="tel"></div>
            <div class="form-group"><label>Software/Sistema</label><input type="text" id="sis" placeholder="Hikvision, Dahua..."></div>
        </div>

        <div class="form-row">
            <div class="form-group"><label>Usuario</label><input type="text" id="usu"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="pas"></div>
        </div>

        <div class="form-group"><label>Almacenamiento (Días)</label><input type="number" id="alm" value="7"></div>
        <div class="form-group"><label>Observaciones Adicionales</label><textarea id="ot" rows="2"></textarea></div>

        <button class="btn-submit" onclick="enviar()">Guardar en Base de Datos</button>
        <button onclick="cerrarTodo()" style="width:100%; background:none; border:none; color:#94a3b8; margin-top:10px; cursor:pointer; font-size:12px;">Descartar cambios</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');

        // Capas profesionales
        const light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

        const map = L.map('map', { center: [-42.912, -71.316], zoom: 14, layers: [light] });
        
        const baseMaps = { "Mapa Claro": light, "Satélite": satellite, "Modo Noche": dark };
        L.control.layers(baseMaps).addTo(map);

        let items = [], seleccionando = false, tempMarker = null;
        const coordsCiudades = { esquel: [-42.912, -71.316], trevelin: [-43.085, -71.463] };

        function logout() {
            localStorage.removeItem('user_session');
            window.location.replace('login.html');
        }

        function actualizarEstiloBotones() {
            const centro = map.getCenter();
            const dE = centro.distanceTo(coordsCiudades.esquel);
            const dT = centro.distanceTo(coordsCiudades.trevelin);
            document.getElementById('nav-esquel').classList.toggle('active', dE < dT);
            document.getElementById('nav-trevelin').classList.toggle('active', dT <= dE);
        }
        map.on('moveend', actualizarEstiloBotones);

        function irA(coords) { map.flyTo(coords, 15); }

        async function load() {
            items.forEach(i => map.removeLayer(i.m));
            items = [];
            const { data } = await _client.from('cameras').select('*');
            data?.forEach(c => {
                const latlng = c.UBICACION?.split(',').map(parseFloat);
                if (latlng && latlng[0]) {
                    let color = c.TIPO === 'CENTRO DE MONITOREO' ? '#2563eb' : (c.TIPO === 'PRIVADAS' ? '#0f172a' : '#10b981');
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="div-icon" style="border-color:${color}; color:${color}; width:24px; height:24px; background:white;"><i class="fa-solid fa-video" style="font-size:10px;"></i></div>`,
                        iconSize: [24, 24], iconAnchor: [12, 12]
                    });
                    const marker = L.marker(latlng, { icon }).addTo(map);
                    marker.bindPopup(`
                        <span class="popup-title">${c.DIRECCION}</span>
                        <div style="font-size:11px; color:gray; margin-bottom:10px;">${c['LUGAR / TITULAR'] || 'Sin titular'}</div>
                        <div class="popup-actions">
                            <button class="btn-edit-mini" onclick="abrirEditar('${c.id}')">Editar</button>
                            <button class="btn-del-mini" onclick="eliminar('${c.id}')">Borrar</button>
                        </div>
                    `);
                    items.push({ id: c.id, m: marker, data: c, info: (c.DIRECCION + " " + (c['LUGAR / TITULAR'] || '')).toLowerCase() });
                }
            });
        }

        async function buscarLugar() {
            const q = document.getElementById('q').value.toLowerCase();
            const item = items.find(i => i.info.includes(q));
            if (item) { map.setView(item.m.getLatLng(), 17); item.m.openPopup(); }
        }

        function activarModoSeleccion() {
            seleccionando = true;
            document.getElementById('map').style.cursor = 'crosshair';
            document.getElementById('instruccion').style.display = 'block';
            document.getElementById('main-btn').style.display = 'none';
        }

        map.on('click', (e) => {
            if (!seleccionando) return;
            document.getElementById('u').value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(e.latlng).addTo(map);
            document.getElementById('form').style.display = 'block';
            document.getElementById('blur').style.display = 'block';
            document.getElementById('instruccion').style.display = 'none';
        });

        function cerrarTodo() {
            document.getElementById('form').style.display = 'none';
            document.getElementById('blur').style.display = 'none';
            document.getElementById('main-btn').style.display = 'flex';
            document.getElementById('map').style.cursor = '';
            if (tempMarker) map.removeLayer(tempMarker);
            seleccionando = false;
        }

        async function enviar() {
            const id = document.getElementById('edit-id').value;
            const cam = { 
                "DIRECCION": document.getElementById('d').value, 
                "UBICACION": document.getElementById('u').value,
                "LUGAR / TITULAR": document.getElementById('n').value,
                "TIPO": document.getElementById('t').value,
                "ciudad": document.getElementById('ciudad_select').value
            };
            if (id) await _client.from('cameras').update(cam).eq('id', id);
            else await _client.from('cameras').insert([cam]);
            cerrarTodo(); load();
        }

        async function eliminar(id) { if(confirm("¿Confirma la eliminación del registro?")) { await _client.from('cameras').delete().eq('id', id); load(); } }
        
        load();
    </script>
</body>
</html>
