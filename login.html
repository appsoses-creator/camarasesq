<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Cámaras</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #1e293b; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        #error-msg { color: #dc2626; font-size: 14px; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="login-btn" onclick="intentarLogin()">Ingresar</button>
        <div id="error-msg"></div>
    </div>

    <script>
        // 1. CONFIGURACIÓN SUPABASE
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');

        // 2. ROMPER EL BUCLE: Si ya hay sesión VÁLIDA, ir al index. Si no, limpiar.
        (function() {
            const session = localStorage.getItem('user_session');
            try {
                if (session) {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.usuario) {
                        window.location.replace('index.html');
                    }
                }
            } catch (e) {
                localStorage.removeItem('user_session');
            }
        })();

        // 3. FUNCIÓN DE LOGIN
        async function intentarLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-msg');

            if (!u || !p) {
                errorDiv.innerText = "Completa todos los campos";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Cargando...";
            errorDiv.innerText = "";

            try {
                const { data, error } = await _client
                    .from('usuarios_app')
                    .select('*')
                    .eq('usuario', u)
                    .eq('clave', p)
                    .single();

                if (error || !data) {
                    errorDiv.innerText = "Usuario o contraseña incorrectos";
                    btn.disabled = false;
                    btn.innerText = "Ingresar";
                } else {
                    // GUARDADO CORRECTO (JSON)
                    localStorage.setItem('user_session', JSON.stringify(data));
                    // REDIRECCIÓN LIMPIA
                    window.location.replace('index.html');
                }
            } catch (err) {
                errorDiv.innerText = "Error de conexión";
                btn.disabled = false;
                btn.innerText = "Ingresar";
            }
        }

        // Permitir "Enter" para entrar
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') intentarLogin();
            });
        });
    </script>
</body>
</html>
