<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPIE - Acceso al Sistema</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            /* CAMBIO A AMARILLO */
            --primary: #f59e0b; 
            --primary-hover: #d97706;
            --bg-dark: #0a0a0a; 
            --card-bg: #161616; 
            --input-bg: #1e1e1e;
            --border: #262626;
            --text-dim: #94a3b8;
            --text-on-primary: #000000; /* Texto negro para contraste */
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark);
            background: radial-gradient(circle at center, #111111 0%, #050505 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Luces ambientales amarillas */
        .ambient-light {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
        }
        .light-1 { top: -100px; right: -50px; }
        .light-2 { bottom: -100px; left: -50px; }

        .login-card { 
            background: var(--card-bg); 
            padding: 45px 35px; 
            border-radius: 24px; 
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); 
            width: 90%; 
            max-width: 380px; 
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            /* Degradado amarillo/naranja */
            background: linear-gradient(135deg, var(--primary), #fbbf24);
            width: 65px;
            height: 65px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: var(--text-on-primary);
            font-size: 26px;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);
        }

        h2 { 
            color: white; 
            margin: 0 0 8px 0; 
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #64748b;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
            margin-left: 4px;
            text-transform: uppercase;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            bottom: 16px;
            color: #4b5563;
            transition: 0.3s;
            font-size: 16px;
        }

        input { 
            width: 100%; 
            padding: 14px 16px 14px 48px; 
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 16px; /* Ajustado para evitar zoom en iOS */
            color: white;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: #252525;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
        }

        input:focus + i { color: var(--primary); }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: var(--text-on-primary); 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            transition: all 0.2s ease; 
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        button:active { transform: translateY(0); }

        button:disabled {
            background: #262626;
            color: #525252;
            cursor: not-allowed;
        }

        #error-msg { 
            color: #fb7185; 
            font-size: 13px; 
            margin-top: 20px; 
            font-weight: 500;
            padding: 12px;
            border-radius: 10px;
            display: none;
            background: rgba(251, 113, 133, 0.1);
            border: 1px solid rgba(251, 113, 133, 0.2);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        @media (max-width: 480px) {
            .login-card { padding: 35px 25px; }
            h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <div class="login-card">
        <div class="logo-area">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h2>SISTEMA DPIE</h2>
        <p class="subtitle">Monitoreo Esquel y Trevelin</p>

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="user" placeholder="nombre.apellido" autocomplete="off">
            <i class="fa-solid fa-user"></i>
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="pass" placeholder="••••••••">
            <i class="fa-solid fa-lock"></i>
        </div>

        <button id="login-btn" onclick="intentarLogin()">
            Acceder <i class="fa-solid fa-chevron-right"></i>
        </button>

        <div id="error-msg"></div>
    </div>

    <script>
        // Configuración Supabase
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');

        // Check Sesión
        (function() {
            const session = localStorage.getItem('user_session');
            try {
                if (session) {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.usuario) {
                        window.location.replace('index.html');
                    }
                }
            } catch (e) {
                localStorage.removeItem('user_session');
            }
        })();

        async function intentarLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-msg');

            if (!u || !p) {
                showError("⚠️ Ingresa tus credenciales");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Autenticando...';
            errorDiv.style.display = "none";

            try {
                const { data, error } = await _client
                    .from('usuarios') 
                    .select('*')
                    .eq('usuario', u)
                    .eq('clave', p)
                    .single();

                if (error || !data) {
                    showError("❌ Credenciales incorrectas");
                    btn.disabled = false;
                    btn.innerHTML = 'Acceder <i class="fa-solid fa-chevron-right"></i>';
                } else {
                    const now = new Date().toISOString();
                    await _client
                        .from('usuarios')
                        .update({ is_online: true, last_login: now })
                        .eq('id', data.id);

                    const sessionData = { 
                        id: data.id,
                        usuario: data.usuario, 
                        rol: data.rol, 
                        is_online: true, 
                        last_login: now 
                    };
                    localStorage.setItem('user_session', JSON.stringify(sessionData));
                    window.location.replace('index.html');
                }
            } catch (err) {
                showError("📡 Error de conexión");
                btn.disabled = false;
                btn.innerHTML = 'Acceder <i class="fa-solid fa-chevron-right"></i>';
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.innerText = msg;
            errorDiv.style.display = "block";
            const card = document.querySelector('.login-card');
            card.style.animation = 'none';
            void card.offsetWidth; 
            card.style.animation = 'shake 0.4s';
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') intentarLogin();
            });
        });
    </script>
</body>
</html>
