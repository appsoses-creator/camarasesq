<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPIE - Acceso al Sistema</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark);
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Elementos decorativos */
        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
        }
        .shape-1 { width: 300px; height: 300px; background: rgba(37, 99, 235, 0.15); top: -100px; right: -50px; }
        .shape-2 { width: 250px; height: 250px; background: rgba(30, 41, 59, 0.5); bottom: -50px; left: -50px; }

        .login-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 50px 40px; 
            border-radius: 28px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 90%; 
            max-width: 420px; 
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            box-sizing: border-box; /* Asegura que el padding no rompa el ancho */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            background: var(--primary);
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: white;
            font-size: 28px;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }

        h2 { 
            color: white; 
            margin: 0 0 8px 0; 
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        p {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            transition: 0.3s;
            font-size: 18px;
        }

        input { 
            width: 100%; 
            padding: 16px 16px 16px 52px; 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 15px;
            color: white;
            transition: all 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        input:focus + i { color: var(--primary); }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        button:hover { 
            background: var(--primary-hover); 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        button:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        #error-msg { 
            color: #fb7185; 
            font-size: 14px; 
            margin-top: 20px; 
            font-weight: 500;
            padding: 10px;
            border-radius: 8px;
            display: none;
            background: rgba(251, 113, 133, 0.1);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* AJUSTES PARA CELULAR (Sin modificar la estructura original) */
        @media (max-width: 480px) {
            body {
                padding: 20px;
            }
            .login-card {
                padding: 35px 25px; /* Menos espacio interno en móvil */
                border-radius: 20px;
            }
            h2 {
                font-size: 19px; /* Texto un poco más pequeño para que no se rompa */
            }
            p {
                font-size: 14px;
                margin-bottom: 25px;
            }
            .logo-area {
                width: 60px;
                height: 60px;
                font-size: 24px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="login-card">
        <div class="logo-area">
            <i class="fa-solid fa-tower-observation"></i>
        </div>
        <h2>CÁMARAS DE SEGURIDAD DPIE</h2>
        <p>Esquel y Trevelin</p>

        <div class="input-group">
            <input type="text" id="user" placeholder="Nombre de usuario" autocomplete="off">
            <i class="fa-solid fa-user-shield"></i>
        </div>

        <div class="input-group">
            <input type="password" id="pass" placeholder="Contraseña">
            <i class="fa-solid fa-lock"></i>
        </div>

        <button id="login-btn" onclick="intentarLogin()">
            Ingresar al Sistema <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>

        <div id="error-msg"></div>
    </div>

    <script>
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');

        (function() {
            const session = localStorage.getItem('user_session');
            try {
                if (session) {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.usuario) {
                        window.location.replace('index.html');
                    }
                }
            } catch (e) {
                localStorage.removeItem('user_session');
            }
        })();

        async function intentarLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-msg');

            if (!u || !p) {
                showError("⚠️ Complete todos los campos");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Verificando...';
            errorDiv.style.display = "none";

            try {
                const { data, error } = await _client
                    .from('usuarios') 
                    .select('*')
                    .eq('usuario', u)
                    .eq('clave', p)
                    .single();

                if (error || !data) {
                    showError("❌ Credenciales no válidas");
                    btn.disabled = false;
                    btn.innerHTML = 'Ingresar al Sistema <i class="fa-solid fa-arrow-right-to-bracket"></i>';
                } else {
                    const now = new Date().toISOString();
                    await _client
                        .from('usuarios')
                        .update({ is_online: true, last_login: now })
                        .eq('id', data.id);

                    const sessionData = { 
                        id: data.id,
                        usuario: data.usuario, 
                        rol: data.rol, 
                        is_online: true, 
                        last_login: now 
                    };
                    localStorage.setItem('user_session', JSON.stringify(sessionData));
                    window.location.replace('index.html');
                }
            } catch (err) {
                showError("📡 Error de conexión con el servidor");
                btn.disabled = false;
                btn.innerHTML = 'Ingresar al Sistema <i class="fa-solid fa-arrow-right-to-bracket"></i>';
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.innerText = msg;
            errorDiv.style.display = "block";
            const card = document.querySelector('.login-card');
            card.style.animation = 'none';
            void card.offsetWidth; 
            card.style.animation = 'shake 0.4s';
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') intentarLogin();
            });
        });
    </script>
</body>
</html>
