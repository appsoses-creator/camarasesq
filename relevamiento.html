<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Relevamiento</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { height: 100%; margin: 0; }
        #map { height: 70vh; width: 100%; }
        .panel { padding: 20px; background: #0f172a; color: white; height: 30vh; }
        .pin-center { position: absolute; top: 35%; left: 50%; z-index: 1000; transform: translate(-50%, -50%); pointer-events: none; color: red; font-size: 30px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="pin-center">📍</div> <div class="panel">
    <h3>Seleccione el lugar del hecho</h3>
    <select id="radio">
        <option value="100">100 metros</option>
        <option value="300">300 metros</option>
    </select>
    <button onclick="generarRelevamiento()">Generar Informe de Cámaras</button>
    <div id="resultado"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _client = supabase.createClient('URL', 'KEY'); // Usa tus credenciales

    // Inicializar mapa sin cargar cámaras
    const map = L.map('map').setView([-42.912, -71.316], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function generarRelevamiento() {
        const centro = map.getCenter(); // Obtenemos las coordenadas del centro exacto
        const radio = document.getElementById('radio').value;
        
        // Llamada a tu función de base de datos
        const { data, error } = await _client.rpc('get_camaras_cercanas', { 
            lat: centro.lat, 
            lng: centro.lng, 
            radio_metros: parseInt(radio) 
        });

        if (error) { alert("Error"); return; }
        
        document.getElementById('resultado').innerText = `Se detectaron ${data.length} cámaras.`;
        // Aquí podrías agregar un botón para descargar el .txt como hicimos antes
    }
</script>
</body>
</html>
