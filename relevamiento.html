<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Relevamiento DPI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Inter', sans-serif; }
        
        /* Panel Lateral */
        #sidebar { width: 350px; background: #0f172a; color: white; padding: 20px; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #2563eb; color: white; font-weight: bold; cursor: pointer; }
        
        /* Mapa */
        #map { flex-grow: 1; height: 100%; }
        .pin-fijo { position: absolute; top: 50%; left: calc(50% + 175px); transform: translate(-50%, -100%); z-index: 1000; font-size: 40px; pointer-events: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Generar Informe</h3>
    <input type="text" id="legajo" placeholder="Legajo Judicial N°">
    <input type="text" id="dir_hecho" placeholder="Dirección del hecho">
    <select id="radio">
        <option value="100">100 metros</option>
        <option value="300" selected>300 metros</option>
        <option value="500">500 metros</option>
    </select>
    <button onclick="buscarCercanas()">Buscar Cámaras</button>
    <div id="resultado"></div>
    <button id="btn-pdf" style="display:none; background:#10b981" onclick="generarPDF()">Descargar Informe (.txt)</button>
</div>

<div id="map"></div>
<div class="pin-fijo">📍</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _client = supabase.createClient('URL', 'KEY');
    const map = L.map('map').setView([-42.912, -71.316], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let ultimasCamaras = [];

    async function buscarCercanas() {
        const centro = map.getCenter();
        const radio = document.getElementById('radio').value;

        const { data, error } = await _client.rpc('get_camaras_cercanas', { 
            lat: centro.lat, lng: centro.lng, radio_metros: parseInt(radio) 
        });

        if (error) { alert("Error: " + error.message); return; }
        
        ultimasCamaras = data;
        document.getElementById('resultado').innerHTML = `Se encontraron <b>${data.length}</b> cámaras.`;
        if(data.length > 0) document.getElementById('btn-pdf').style.display = 'block';
    }

    function generarPDF() {
        const legajo = document.getElementById('legajo').value;
        const dir = document.getElementById('dir_hecho').value;
        
        let texto = `INFORME DE RELEVAMIENTO - DPI\n`;
        texto += `Legajo: ${legajo}\nLugar del hecho: ${dir}\n\nCámaras cercanas:\n`;
        texto += ultimasCamaras.map(c => `- ${c.DIRECCION} | Titular: ${c['LUGAR / TITULAR']}`).join('\n');
        
        const blob = new Blob([texto], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Informe_${legajo}.txt`;
        a.click();
    }
</script>
</body>
</html>
