<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relevamiento - 23</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --primary: #2563eb; --dark-bg: #0f172a; --glass-bg: rgba(255, 255, 255, 0.95); --success: #10b981; --danger: #ef4444; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--dark-bg); overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .center-pin { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -100%); z-index: 2000; pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .top-bar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; background: var(--glass-bg); padding: 15px; border-radius: 20px; text-align: center; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        /* Contenedor de botones actualizado */
        .container-btns { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 2000; }
        .btn-aceptar, .btn-cancelar { padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: 600; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .btn-aceptar { background: var(--primary); color: white; }
        .btn-cancelar { background: var(--danger); color: white; }

        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: var(--glass-bg); z-index: 3000; transition: 0.3s; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        .sidebar.active { left: 0; }
        .sidebar input { width: 100%; padding: 10px; margin: 10px 0 20px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-buscar { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .custom-div-icon { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="top-bar" id="topBar">MARQUE EL LUGAR DEL HECHO</div>
    <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" class="center-pin" id="centerPin" width="45">
    
    <div class="container-btns" id="cont-botones">
        <button class="btn-aceptar" onclick="confirmarUbicacion()">ACEPTAR</button>
        <button class="btn-cancelar" onclick="cancelarMarcar()">CANCELAR</button>
    </div>

    <div id="sidebar" class="sidebar">
        <h3>Datos del hecho</h3>
        <label>Dirección:</label>
        <input type="text" id="direccion" placeholder="Calle y altura">
        <label>Cuadras a la redonda:</label>
        <input type="number" id="radio" value="2">
        <label>Legajo Fiscal:</label>
        <input type="text" id="legajo">
        <button class="btn-buscar" onclick="buscarCamaras()">BUSCAR CÁMARAS</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const _client = supabase.createClient('https://ubdlfcjcgdnzqwjvwsmn.supabase.co', 'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu');
        const map = L.map('map', { zoomControl: false }).setView([-42.912, -71.316], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let markerHecho;
        let camarasLayer = L.layerGroup().addTo(map);

        function confirmarUbicacion() {
            const centro = map.getCenter();
            if(markerHecho) map.removeLayer(markerHecho);
            markerHecho = L.marker([centro.lat, centro.lng], {
                icon: L.divIcon({ html: '<i class="fa fa-map-marker-alt" style="color:red; font-size:30px;"></i>', className: 'custom-div-icon' })
            }).addTo(map);

            // Ocultar elementos de UI
            document.getElementById('topBar').style.display = 'none';
            document.getElementById('centerPin').style.display = 'none';
            document.getElementById('cont-botones').style.display = 'none';
            
            document.getElementById('sidebar').classList.add('active');
        }

        function cancelarMarcar() {
            if (markerHecho) { map.removeLayer(markerHecho); markerHecho = null; }
            document.getElementById('sidebar').classList.remove('active');
        }

        async function buscarCamaras() {
            document.getElementById('sidebar').classList.remove('active');
            
            // Restaurar UI al buscar
            document.getElementById('topBar').style.display = 'block';
            document.getElementById('centerPin').style.display = 'block';
            document.getElementById('cont-botones').style.display = 'flex';

            const cuadras = parseInt(document.getElementById('radio').value) || 2;
            const radioEnMetros = cuadras * 100;
            const centro = markerHecho.getLatLng();

            const { data, error } = await _client.from('cameras').select('*'); 

            if (error) { alert("Error: Conexión a Supabase no encontrada."); return; }

            if (data) {
                camarasLayer.clearLayers();
                let encontradas = 0;
                data.forEach(cam => {
                    const latlng = cam.UBICACION?.split(',').map(parseFloat);
                    if (latlng && latlng.length === 2) {
                        const distMetros = map.distance([centro.lat, centro.lng], latlng);
                        if (distMetros <= radioEnMetros) {
                            let color = '#10b981'; 
                            if(cam.TIPO === 'CENTRO DE MONITOREO') color = '#2563eb';
                            else if(cam.TIPO === 'PRIVADAS') color = '#0f172a';

                            const icon = L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div style="background:white; border:3px solid ${color}; color:${color}; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.2)"><i class="fa-solid fa-video" style="font-size:12px"></i></div>`,
                                iconSize: [30, 30], iconAnchor: [15, 15]
                            });

                            const contenidoPopup = `
                                <div style="font-family: sans-serif; line-height: 1.2;">
                                    <div style="font-weight: 700; color: #0f172a; font-size: 14px;">${cam.DIRECCION || 'Sin dirección'}</div>
                                    <div style="color: #64748b; font-size: 13px;">${cam['LUGAR / TITULAR'] || 'Sin titular'}</div>
                                    <div style="margin-top: 5px; font-weight: 600; font-size: 13px;">${Math.round(distMetros)} metros</div>
                                </div>
                            `;

                            L.marker(latlng, { icon }).addTo(camarasLayer).bindPopup(contenidoPopup);
                            encontradas++;
                        }
                    }
                });
                if (markerHecho) { map.removeLayer(markerHecho); markerHecho = null; }
                if (encontradas === 0) alert("No se encontraron cámaras en ese radio.");
            }
        }
    </script>
</body>
</html>
