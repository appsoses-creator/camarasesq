<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELEVAMIENTO QQQQQQQ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
overflow:hidden;
}

#map{
height:100vh;
width:100%;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:300px;
height:100%;
background:white;
padding:20px;
z-index:1000;
}

.sidebar input{
width:100%;
padding:8px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

#capture-container{
position:absolute;
left:-9999px;
width:1100px;
background:white;
padding:20px;
display:flex;
gap:30px;
}

#map-snapshot{
width:650px;
height:420px;
}

#list-content{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="sidebar">

<h3>Datos del hecho</h3>

<label>Dirección</label>
<input id="direccion">

<label>Cuadras</label>
<input id="radio" type="number" value="2">

<label>Legajo</label>
<input id="legajo">

<button onclick="buscarCamaras()">BUSCAR CAMARAS</button>
<button onclick="generarReporte()">GENERAR REPORTE</button>

</div>

<div id="capture-container">

<div id="map-snapshot"></div>

<div style="width:400px">
<h3>Referencias de cámaras</h3>
<div id="list-content"></div>
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const supa = supabase.createClient(
'https://ubdlfcjcgdnzqwjvwsmn.supabase.co',
'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu'
);

const map = L.map('map').setView([-42.912,-71.316],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markerHecho;
let camarasLayer=L.layerGroup().addTo(map);

function confirmarUbicacion(){

const centro=map.getCenter();

if(markerHecho) map.removeLayer(markerHecho);

markerHecho=L.marker([centro.lat,centro.lng]).addTo(map);

}

async function buscarCamaras(){

if(!markerHecho){
alert("Marque el lugar primero");
return;
}

const cuadras=parseInt(document.getElementById("radio").value)||2;

const radio=cuadras*100;

const centro=markerHecho.getLatLng();

const {data}=await supa.from("cameras").select("*");

camarasLayer.clearLayers();

let numero=1;

data.forEach(cam=>{

const latlng=cam.UBICACION?.split(",").map(parseFloat);

if(!latlng)return;

const dist=map.distance([centro.lat,centro.lng],latlng);

if(dist<=radio){

let color="#10b981";

if(cam.TIPO==="CENTRO DE MONITOREO")color="#2563eb";
if(cam.TIPO==="PRIVADAS")color="#000";

const icon=L.divIcon({
className:'custom-div-icon',
html:`<div style="
background:white;
border:3px solid ${color};
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:${color};
font-size:15px;
box-shadow:0 4px 8px rgba(0,0,0,0.3)
">${numero}</div>`
});

L.marker(latlng,{icon}).addTo(camarasLayer)
.bindPopup(`<b>${numero} - ${cam.DIRECCION}</b><br>${cam['LUGAR / TITULAR']}<br>${Math.round(dist)} metros`);

numero++;

}

});

}

async function generarReporte(){

map.invalidateSize();

await new Promise(r=>setTimeout(r,800));

const canvasMapa=await html2canvas(document.getElementById("map"),{
useCORS:true,
scale:2
});

const mapSnapshot=document.getElementById("map-snapshot");

mapSnapshot.innerHTML="";

mapSnapshot.appendChild(canvasMapa);

const list=document.getElementById("list-content");

list.innerHTML="";

let i=1;

camarasLayer.eachLayer(layer=>{

const txt=layer.getPopup().getContent();

list.innerHTML+=`<div>${txt}</div>`;

i++;

});

html2canvas(document.getElementById("capture-container"),{
scale:2
}).then(canvas=>{

const link=document.createElement("a");

link.download="reporte.png";

link.href=canvas.toDataURL();

link.click();

});

}

</script>

</body>
</html>
