<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relevamiento - DPIE 23</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2563eb; --dark-bg: #0f172a; --glass-bg: rgba(255, 255, 255, 0.95); --success: #10b981; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--dark-bg); overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Pin central para relevamiento */
        .center-pin {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -100%);
            z-index: 2000; pointer-events: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .btn-confirmar {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: var(--success); color: white;
            border: none; padding: 16px 30px; border-radius: 50px;
            font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }

        .top-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 92%; max-width: 600px;
            background: var(--glass-bg); padding: 15px; border-radius: 20px;
            text-align: center; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        Modo Relevamiento: Ubique el punto en el mapa
    </div>

    <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" class="center-pin" width="45">
    
    <button class="btn-confirmar" onclick="capturarUbicacion()">
        <i class="fa-solid fa-check"></i> CONFIRMAR PUNTO
    </button>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicialización básica del mapa
        const map = L.map('map', { zoomControl: false }).setView([-42.912, -71.316], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        function capturarUbicacion() {
            const centro = map.getCenter();
            const latlng = `${centro.lat.toFixed(6)}, ${centro.lng.toFixed(6)}`;
            
            // Aquí puedes redirigir al formulario pasando las coordenadas
            // o abrir el modal de carga directamente
            alert("Coordenadas capturadas: " + latlng);
            console.log("Guardar en Supabase:", latlng);
        }
    </script>
</body>
</html>
