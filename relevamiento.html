<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RELEVAMIENTO ww</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root { --primary:#2563eb; --dark-bg:#0f172a; --glass-bg:rgba(255,255,255,0.95); --success:#10b981; --danger:#ef4444; }

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--dark-bg);
overflow:hidden;
}

#map{
height:100vh;
width:100%;
z-index:1;
}

#capture-container{
position:absolute;
left:-9999px;
width:1000px;
background:white;
padding:20px;
display:flex;
flex-direction:row;
gap:20px;
}

.center-pin{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-100%);
z-index:2000;
pointer-events:none;
}

.top-bar{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
width:90%;
max-width:400px;
background:var(--glass-bg);
padding:15px;
border-radius:20px;
text-align:center;
font-weight:700;
}

.container-btns{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:2000;
}

.btn-aceptar,.btn-cancelar{
padding:15px 30px;
border-radius:50px;
cursor:pointer;
font-weight:600;
border:none;
}

.btn-aceptar{background:var(--primary);color:white;}
.btn-cancelar{background:var(--danger);color:white;}

.sidebar{
position:fixed;
top:0;
left:0;
width:300px;
height:100%;
background:var(--glass-bg);
z-index:3000;
padding:20px;
}

.sidebar input{
width:100%;
padding:10px;
margin:10px 0 20px;
border:1px solid #ccc;
border-radius:8px;
}

.btn-buscar{
width:100%;
padding:15px;
background:var(--success);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-bottom:10px;
}

.custom-div-icon{
display:flex;
align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<div class="top-bar" id="topBar">MARQUE EL LUGAR DEL HECHO</div>

<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png"
class="center-pin" id="centerPin" width="45">

<div class="container-btns" id="cont-botones">
<button class="btn-aceptar" onclick="confirmarUbicacion()">ACEPTAR</button>
<button class="btn-cancelar" onclick="cancelarMarcar()">CANCELAR</button>
</div>

<div id="sidebar" class="sidebar">
<h3>Datos del hecho</h3>

<label>Dirección:</label>
<input type="text" id="direccion">

<label>Cuadras a la redonda:</label>
<input type="number" id="radio" value="2">

<label>Legajo Fiscal:</label>
<input type="text" id="legajo">

<label>Carátula:</label>
<input type="text" id="caratula">

<button class="btn-buscar" onclick="buscarCamaras()">BUSCAR CÁMARAS</button>

<button id="btn-reporte"
class="btn-buscar"
style="background:#3b82f6;display:none;"
onclick="generarReporte()">GENERAR REPORTE</button>

<button id="btn-nuevo-lugar"
class="btn-buscar"
style="display:none;background:var(--primary);"
onclick="resetearInterfaz()">MARCAR NUEVO LUGAR</button>
</div>

<div id="capture-container">

<div style="position:absolute;top:10px;width:100%;font-size:13px;">
<b>Dirección:</b> <span id="rep-direccion"></span> |
<b>Legajo:</b> <span id="rep-legajo"></span> |
<b>Carátula:</b> <span id="rep-caratula"></span> |
<b>Fecha:</b> <span id="rep-fecha"></span>
</div>

<div id="map-snapshot" style="margin-top:40px;width:720px;height:450px;"></div>

<div style="width:250px;font-size:11px;line-height:1.2;">
<h3>Referencias de cámaras</h3>
<div id="list-content" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const _client = supabase.createClient(
'https://ubdlfcjcgdnzqwjvwsmn.supabase.co',
'sb_publishable_S1a63j542PSx9Ba0z93zog_8i76qTZu'
);

const map = L.map('map',{zoomControl:false})
.setView([-42.912,-71.316],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markerHecho;
let camarasLayer = L.layerGroup().addTo(map);

function ajustarMapaAContenido(){
const grupo=camarasLayer.getLayers();
if(grupo.length>0){
const bounds=L.featureGroup(grupo).getBounds();
map.fitBounds(bounds,{padding:[50,50]});
}
}

function confirmarUbicacion(){
const centro=map.getCenter();
if(markerHecho)map.removeLayer(markerHecho);

markerHecho=L.marker([centro.lat,centro.lng],{
icon:L.divIcon({
html:'<i class="fa fa-map-marker-alt" style="color:red;font-size:30px;"></i>',
className:'custom-div-icon'
})
}).addTo(map);
}

function cancelarMarcar(){
if(markerHecho){
map.removeLayer(markerHecho);
markerHecho=null;
}
}

async function buscarCamaras(){

if(!markerHecho){
alert("Primero debe confirmar la ubicación del hecho.");
return;
}

document.getElementById('topBar').style.display='none';
document.getElementById('centerPin').style.display='none';
document.getElementById('cont-botones').style.display='none';

const cuadras=parseInt(document.getElementById('radio').value)||2;
const radioEnMetros=cuadras*100;
const centro=markerHecho.getLatLng();

const {data,error}=await _client.from('cameras').select('*');

if(error){
alert("Error de conexión.");
return;
}

if(data){

camarasLayer.clearLayers();
let numero=1;

data.forEach(cam=>{

const latlng=cam.UBICACION?.split(',').map(parseFloat);

if(latlng&&latlng.length===2){

const distMetros=map.distance([centro.lat,centro.lng],latlng);

if(distMetros<=radioEnMetros){

const icon=L.divIcon({
className:'custom-div-icon',
html:`<div style="background:white;border:3px solid #000;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold">${numero}</div>`,
iconSize:[30,30],
iconAnchor:[15,15]
});

L.marker(latlng,{icon})
.addTo(camarasLayer)
.bindPopup(`<b>${numero}. ${cam.DIRECCION}</b><br>${cam['LUGAR / TITULAR']}<br><i>${Math.round(distMetros)} metros</i>`);

numero++;

}

}

});

document.getElementById('btn-reporte').style.display='block';

}

}

async function generarReporte(){

document.getElementById('sidebar').style.display='none';

document.getElementById('rep-direccion').innerText=document.getElementById('direccion').value;
document.getElementById('rep-legajo').innerText=document.getElementById('legajo').value;
document.getElementById('rep-caratula').innerText=document.getElementById('caratula').value;
document.getElementById('rep-fecha').innerText=new Date().toLocaleDateString();

ajustarMapaAContenido();

await new Promise(r=>setTimeout(r,1500));

const canvasMapa=await html2canvas(document.getElementById('map'),{scale:2});

const listContent=document.getElementById('list-content');
listContent.innerHTML="";

camarasLayer.eachLayer(layer=>{
const content=layer.getPopup()?.getContent();
if(content)
listContent.innerHTML+=`<div style="border-bottom:1px solid #ddd;padding-bottom:3px;margin-bottom:3px;">${content}</div>`;
});

const mapSnapshot=document.getElementById('map-snapshot');
mapSnapshot.innerHTML="";
mapSnapshot.appendChild(canvasMapa);

html2canvas(document.getElementById('capture-container'),{scale:2}).then(canvasFinal=>{

const link=document.createElement('a');
link.download='reporte-camaras.png';
link.href=canvasFinal.toDataURL();
link.click();

document.getElementById('sidebar').style.display='block';
document.getElementById('btn-nuevo-lugar').style.display='block';

});

}

function resetearInterfaz(){

document.getElementById('topBar').style.display='block';
document.getElementById('centerPin').style.display='block';
document.getElementById('cont-botones').style.display='flex';

document.getElementById('btn-nuevo-lugar').style.display='none';
document.getElementById('btn-reporte').style.display='none';

if(markerHecho){
map.removeLayer(markerHecho);
markerHecho=null;
}

camarasLayer.clearLayers();

map.setView([-42.912,-71.316],15);

}

</script>

</body>
</html>
